<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#020617">
    <title>Jobs - Clearline</title>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="data-migration.js"></script>
    <script src="firebase-sync.js"></script>
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            primary: '#0ea5e9',
                            secondary: '#38bdf8',
                            dark: '#0f172a',
                            darker: '#020617',
                            accent: '#06b6d4',
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="app.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            background: transparent;
        }
        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%) !important;
            color: white !important;
            box-shadow: 0 2px 8px rgba(14, 165, 233, 0.3);
        }
        .job-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-radius: 10px !important;
        }
        .job-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.15);
        }
        .job-card:active {
            transform: scale(0.98) translateY(0);
            opacity: 0.95;
        }
        .edit-scroll {
            max-height: calc(100dvh - 260px);
            max-height: calc(100vh - 260px);
            overflow-y: auto;
            padding-right: 4px;
        }
        .edit-footer {
            position: sticky;
            bottom: 0;
            background: #1e293b;
            padding-top: 10px;
            padding-bottom: 6px;
        }
        .edit-field {
            background: #334155;
            border: 1px solid #475569;
            color: #f8fafc;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .photo-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .photo-tile {
            position: relative;
        }
        .photo-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 999px;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        /* Ensure modal styling stays consistent */
        .modal {
            display: none;
            align-items: flex-end;
            justify-content: center;
            background: rgba(2, 6, 23, 0.85);
            animation: modalFadeIn 0.2s ease;
        }
        .modal.show,
        .modal.modal-open,
        .modal:not([hidden]) {
            display: flex !important;
        }
        .modal-content {
            width: 100%;
            max-width: 560px;
            border-radius: 10px 10px 0 0;
            animation: modalSlideUp 0.25s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="app-header-inner">
            <h1>Jobs</h1>
            <span id="syncPill" title="Sync status" style="font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;background:#334155;color:#cbd5e1;margin-left:8px;">• Local</span>
            <a href="map.html" class="header-btn header-btn-right" title="Map View" style="margin-left:auto;">
                <i class="fas fa-map-marker-alt"></i>
            </a>
        </div>
    </header>

    <main class="app-content">
      <div class="content-wrapper">
        <!-- Tab Navigation -->
        <div class="filter-tabs" style="display: flex; gap: 4px; margin-bottom: 12px; background: rgba(51,65,85,0.5); padding: 4px; border-radius: 12px;">
            <button onclick="setTab('leads')" data-tab="leads" class="tab-btn" style="flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer;">Leads</button>
            <button onclick="setTab('quoted')" data-tab="quoted" class="tab-btn" style="flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer;">Quoted</button>
            <button onclick="setTab('scheduled')" data-tab="scheduled" class="tab-btn active" style="flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer;">Scheduled</button>
            <button onclick="setTab('completed')" data-tab="completed" class="tab-btn" style="flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer;">Done</button>
        </div>

        <!-- Summary Stats — clickable shortcuts to matching tab (#11) -->
        <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
            <div class="stat-card" role="button" tabindex="0" style="cursor:pointer;" onclick="setTab('leads')">
                <p class="value" style="color: #3b82f6;" id="stat-leads">0</p>
                <p class="label">Leads</p>
            </div>
            <div class="stat-card" role="button" tabindex="0" style="cursor:pointer;" onclick="setTab('quoted')">
                <p class="value" style="color: #fbbf24;" id="stat-quoted">0</p>
                <p class="label">Quoted</p>
            </div>
            <div class="stat-card" role="button" tabindex="0" style="cursor:pointer;" onclick="setTab('scheduled')">
                <p class="value" style="color: #a78bfa;" id="stat-scheduled">0</p>
                <p class="label">Scheduled</p>
            </div>
            <div class="stat-card" role="button" tabindex="0" style="cursor:pointer;" onclick="setTab('completed')">
                <p class="value" style="color: #34d399;" id="stat-completed">0</p>
                <p class="label">Done</p>
            </div>
        </div>

        <!-- Jobs List -->
        <div id="jobsList" style="margin-bottom: 16px;"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden" style="text-align: center; padding: 48px 0;">
            <i class="fas fa-calendar-check" style="font-size: 40px; color: #475569; margin-bottom: 12px;"></i>
            <p style="color: #64748b; font-size: 14px;">No jobs in this view</p>
            <a href="quick-add.html" class="btn-primary" style="display: inline-block; margin-top: 16px; width: auto; padding: 12px 24px;">
                <i class="fas fa-plus" style="margin-right: 6px;"></i>Add Job
            </a>
        </div>
      </div>
    </main>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
        <div class="tab-bar-inner">
            <a href="index.html" class="tab-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="jobs.html" class="tab-item active">
                <i class="fas fa-briefcase"></i>
                <span>Jobs</span>
            </a>
            <a href="quick-add.html" class="tab-item tab-item-add">
                <div class="tab-add-btn">
                    <i class="fas fa-plus"></i>
                </div>
                <span>Add</span>
            </a>
            <a href="calendar.html" class="tab-item">
                <i class="fas fa-calendar"></i>
                <span>Calendar</span>
            </a>
            <a href="customer-tracker.html" class="tab-item">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
        </div>
    </nav>

    <!-- Job Detail Modal -->
    <div id="jobModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="jobModal-title" hidden style="z-index:200; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:flex-end; justify-content:center;">
        <div class="modal-content bg-slate-800 rounded-t-2xl w-full overflow-y-auto" role="document" style="max-height: calc(100dvh - 40px); max-height: calc(100vh - 40px); padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));">
            <div class="modal-header sticky top-0 bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center" style="z-index:10;">
                <h2 id="jobModal-title" class="text-lg font-bold">Job Details</h2>
                <button class="modal-close-btn" onclick="closeJobModal()" aria-label="Close dialog">&times;</button>
            </div>
            <div id="modalContent" class="p-4" style="padding-bottom: 24px;"></div>
        </div>
    </div>

    <!-- Document View Modal -->
    <div id="documentModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="documentModal-title" hidden style="z-index:250; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:flex-end; justify-content:center;">
        <div class="modal-content bg-slate-800 rounded-t-2xl w-full overflow-y-auto" role="document" style="max-height: calc(100dvh - 40px); max-height: calc(100vh - 40px); padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));">
            <div class="modal-header sticky top-0 bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center" style="z-index:10;">
                <h2 id="documentModal-title" class="text-lg font-bold">Document</h2>
                <button class="modal-close-btn" onclick="closeDocumentModal()" aria-label="Close dialog">&times;</button>
            </div>
            <div id="documentContent" class="p-4" style="padding-bottom: 24px;"></div>
        </div>
    </div>

    <script>
        // Maps API Key (from config.js)
        const MAPS_API_KEY = window.CL_SECRETS?.mapsApiKey || '';
        let userLocation = null;

        // Hydrate user location from the shared 30-minute cache.
        // Never triggers a geolocation prompt on page load.
        function getUserLocation() {
            getCachedLocation({ prompt: false }).then(loc => {
                if (loc) userLocation = loc;
            });
        }

        // Calculate distance (miles) between two points
        function calcDistance(lat1, lng1, lat2, lng2) {
            const R = 3959;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Estimate drive time
        function estimateDriveTime(miles) {
            const mins = Math.round((miles / 30) * 60);
            return mins < 60 ? `${mins} min` : `${Math.floor(mins/60)}h ${mins%60}m`;
        }

        // Geocode cache — addresses rarely move; caching 24h saves a billable
        // Maps Geocoding API call every time a job modal opens. (#7)
        const GEOCODE_CACHE_KEY = 'cl-geocode-cache';
        const GEOCODE_TTL_MS = 24 * 60 * 60 * 1000;
        function getGeocodeCache() { return safeGet(GEOCODE_CACHE_KEY, {}) || {}; }
        function cachedGeocode(address) {
            const cache = getGeocodeCache();
            const entry = cache[address];
            if (entry && typeof entry.ts === 'number' && (Date.now() - entry.ts) < GEOCODE_TTL_MS) {
                return { lat: entry.lat, lng: entry.lng };
            }
            return null;
        }
        function saveGeocode(address, lat, lng) {
            const cache = getGeocodeCache();
            cache[address] = { lat, lng, ts: Date.now() };
            safeSet(GEOCODE_CACHE_KEY, cache);
        }

        // Get distance to job address (with geocode cache).
        async function getDistanceToAddress(address) {
            if (!userLocation || !address) return null;
            let coords = cachedGeocode(address);
            if (!coords) {
                try {
                    const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${MAPS_API_KEY}`);
                    const data = await res.json();
                    if (data.status === 'OK' && data.results[0]) {
                        const loc = data.results[0].geometry.location;
                        coords = { lat: loc.lat, lng: loc.lng };
                        saveGeocode(address, coords.lat, coords.lng);
                    }
                } catch (e) { console.log('Geocode error:', e); }
            }
            if (!coords) return null;
            const dist = calcDistance(userLocation.lat, userLocation.lng, coords.lat, coords.lng);
            return { distance: dist.toFixed(1), time: estimateDriveTime(dist) };
        }

        // Parse free-form jobTime into {h, m}. Accepts 'HH:MM', 'HH:MM AM/PM',
        // 'H', '9 pm', etc. Returns null for unparseable values. (#15)
        function parseJobTime(raw) {
            if (!raw) return null;
            const s = String(raw).trim();
            if (!s) return null;
            const m = s.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?$/i);
            if (!m) return null;
            let h = parseInt(m[1], 10);
            const mm = m[2] ? parseInt(m[2], 10) : 0;
            const ap = m[3] ? m[3].toLowerCase() : null;
            if (isNaN(h) || isNaN(mm) || h < 0 || h > 23 || mm < 0 || mm > 59) return null;
            if (ap === 'pm' && h < 12) h += 12;
            if (ap === 'am' && h === 12) h = 0;
            return { h, m: mm };
        }

        // Google Calendar - uses token from Firebase sign-in
        let gapiInited = false;
        let accessToken = localStorage.getItem('gcal-token') || null;
        let tokenExpiry = parseInt(localStorage.getItem('gcal-token-expiry') || '0');

        // Use CL_DATA for separate jobs
        let jobs = [];
        let currentTab = 'scheduled';
        let editPhotoState = { before: [], after: [] };
        
        // Default job categories (used if no custom ones in settings)
        const DEFAULT_CATEGORIES = ['Pressure Washing', 'Soft Wash', 'Non-PW', 'Other'];
        
        function getJobCategories() {
            try {
                const settings = safeGet('cl-settings', {});
                if (settings.jobCategories && settings.jobCategories.trim()) {
                    return settings.jobCategories.split(',').map(s => s.trim()).filter(Boolean);
                }
            } catch(e) {}
            return DEFAULT_CATEGORIES;
        }
        
        // Normalize any legacy status values (#14). Older jobs sometimes have
        // status='lead' which the current 4-bucket UI can't route anywhere.
        // Fold those into 'new' once, then persist so later loads are clean.
        function normalizeLegacyStatuses() {
            const raw = CL_DATA.getJobs();
            let changed = 0;
            raw.forEach(j => {
                if (j.status === 'lead') {
                    CL_DATA.updateJob(j.id, { status: 'new' });
                    changed++;
                }
            });
            return changed;
        }

        function loadData() {
            normalizeLegacyStatuses();
            jobs = CL_DATA.getJobs();
        }

        // Load Google Calendar API
        function loadGapiScript() {
            return new Promise((resolve, reject) => {
                if (typeof gapi !== 'undefined') { resolve(); return; }
                const script = document.createElement('script');
                script.src = 'https://apis.google.com/js/api.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function initGapiClient() {
            if (gapiInited) return;
            await loadGapiScript();
            await new Promise(resolve => gapi.load('client', resolve));
            await gapi.client.init({});
            await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest');
            gapiInited = true;
        }

        // Refresh token state from localStorage — the rest of the UI uses
        // `accessToken`/`tokenExpiry` directly. No DOM side effects (#2).
        function checkGoogleAuth() {
            accessToken = localStorage.getItem('gcal-token');
            tokenExpiry = parseInt(localStorage.getItem('gcal-token-expiry') || '0');
        }

        // Wipe the cached Calendar token when we get an auth error from the
        // Calendar API so we don't keep retrying with a dead token. (#8)
        function invalidateCalendarToken() {
            accessToken = null;
            tokenExpiry = 0;
            safeRemove('gcal-token');
            safeRemove('gcal-token-expiry');
        }

        // Sync-state pill in the header. Reflects online + signed-in + sync
        // activity so users know when edits are cloud-safe. (#12)
        function updateSyncPill() {
            const pill = document.getElementById('syncPill');
            if (!pill) return;
            const online = navigator.onLine !== false;
            const signedIn = !!(window.CL_FIREBASE && CL_FIREBASE.isSignedIn);
            let bg = '#334155', color = '#cbd5e1', label = '• Local';
            if (!online) { bg = '#7f1d1d'; color = '#fecaca'; label = '• Offline'; }
            else if (!signedIn) { bg = '#334155'; color = '#cbd5e1'; label = '• Local'; }
            else { bg = '#064e3b'; color = '#a7f3d0'; label = '✓ Synced'; }
            pill.style.background = bg;
            pill.style.color = color;
            pill.textContent = label;
        }
        function flashSyncPill(text, bg, color) {
            const pill = document.getElementById('syncPill');
            if (!pill) return;
            pill.style.background = bg;
            pill.style.color = color;
            pill.textContent = text;
            setTimeout(updateSyncPill, 1500);
        }

        // Listen for Firebase auth + sync events
        window.addEventListener('cl-auth-change', () => {
            checkGoogleAuth();
            updateSyncPill();
            if (CL_FIREBASE.isCalendarConnected()) initGapiClient();
        });
        window.addEventListener('cl-sync-updated', () => {
            flashSyncPill('✓ Synced', '#064e3b', '#a7f3d0');
            loadData();
            updateStats();
            renderJobs();
        });
        window.addEventListener('online', updateSyncPill);
        window.addEventListener('offline', updateSyncPill);

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updateStats();
            renderJobs();
            getUserLocation(); // Get user location for distance estimates
            checkGoogleAuth(); // Check if Calendar is connected via Firebase
            if (accessToken && tokenExpiry > Date.now()) {
                initGapiClient(); // Init Calendar API if connected
            }
            setActiveNav();
            updateSyncPill();

            // Deep-link support: jobs.html?highlight=<id>[&edit=1] (#4)
            const params = new URLSearchParams(window.location.search);
            const highlight = params.get('highlight');
            const edit = params.get('edit') === '1';
            if (highlight) {
                const job = jobs.find(j => j.id === highlight);
                if (job) {
                    if (edit) editJob(highlight);
                    else openJobModal(highlight);
                    // Ensure the correct tab is active so the card is visible
                    // after closing the modal.
                    const bucket = job.status === 'completed' ? 'completed'
                                : job.status === 'scheduled' ? 'scheduled'
                                : job.status === 'quoted'    ? 'quoted'
                                : 'leads';
                    setTab(bucket);
                }
            }
        });

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            renderJobs();
        }

        function updateStats() {
            // Count by status
            const leads = jobs.filter(j => j.status === 'new');
            const quoted = jobs.filter(j => j.status === 'quoted');
            const scheduled = jobs.filter(j => j.status === 'scheduled');
            const completed = jobs.filter(j => j.status === 'completed');

            document.getElementById('stat-leads').textContent = leads.length;
            document.getElementById('stat-quoted').textContent = quoted.length;
            document.getElementById('stat-scheduled').textContent = scheduled.length;
            document.getElementById('stat-completed').textContent = completed.length;
        }

        function renderJobsList() {
            const today = new Date().toISOString().split('T')[0];
            let filtered = [];

            // Filter by status (cleaner workflow)
            if (currentTab === 'leads') {
                // Leads: new status, no job date
                filtered = jobs.filter(j => j.status === 'new');
            } else if (currentTab === 'quoted') {
                // Quoted: has quote, awaiting scheduling
                filtered = jobs.filter(j => j.status === 'quoted');
            } else if (currentTab === 'scheduled') {
                // Scheduled: has job date, ready to work
                filtered = jobs.filter(j => j.status === 'scheduled');
            } else if (currentTab === 'completed') {
                // Completed: done
                filtered = jobs.filter(j => j.status === 'completed');
            }

            // Sort by date (scheduled jobs by upcoming date, others by date added)
            filtered.sort((a, b) => {
                if (currentTab === 'scheduled') {
                    const dateA = new Date(a.jobDate || '9999-12-31');
                    const dateB = new Date(b.jobDate || '9999-12-31');
                    return dateA - dateB;
                } else if (currentTab === 'completed') {
                    // Most recent first
                    const dateA = new Date(a.lastUpdated || a.dateAdded || 0);
                    const dateB = new Date(b.lastUpdated || b.dateAdded || 0);
                    return dateB - dateA;
                } else {
                    // Leads and quoted: most recent first
                    const dateA = new Date(a.dateAdded || 0);
                    const dateB = new Date(b.dateAdded || 0);
                    return dateB - dateA;
                }
            });

            const container = document.getElementById('jobsList');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            // Group by date
            const grouped = {};
            filtered.forEach(job => {
                const date = job.jobDate || 'Unscheduled';
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(job);
            });

            let html = '';
            Object.keys(grouped).forEach(date => {
                const dateObj = date !== 'Unscheduled' ? new Date(date + 'T12:00:00') : null;
                const dateLabel = dateObj ? dateObj.toLocaleDateString('en-US', { 
                    weekday: 'long', month: 'short', day: 'numeric' 
                }) : 'Unscheduled';
                const isToday = date === today;

                html += `
                    <div class="mb-4">
                        <h3 class="text-sm font-bold ${isToday ? 'text-primary' : 'text-gray-400'} mb-2">
                            ${isToday ? '📍 TODAY' : dateLabel}
                        </h3>
                        <div class="space-y-2">
                            ${grouped[date].map(job => renderJobCard(job)).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderJobs() {
            renderJobsList();
        }

        function renderJobCard(job) {
            const statusColors = {
                scheduled: 'bg-purple-500',
                completed: 'bg-green-500',
                quoted: 'bg-yellow-500',
                new: 'bg-blue-500'
            };

            return `
                <div class="job-card glass-card rounded-lg p-3 relative overflow-hidden animate-in" onclick="openJobModal('${job.id}')">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5">
                                <span class="w-2 h-2 rounded-full ${statusColors[job.status] || 'bg-gray-500'} flex-shrink-0"></span>
                                <h4 class="font-semibold text-sm truncate">${job.customerName || 'No Name'}</h4>
                                ${job.status === 'completed' ? '<i class="fas fa-check-circle text-green-400 text-xs"></i>' : ''}
                            </div>
                            <p class="text-xs text-gray-500">${job.serviceType || 'Service'}</p>

        // Downscale + compress uploaded photos before storing them as base64
        // so localStorage and Firestore don't fill up with raw camera output. (#6)
        const PHOTO_MAX_EDGE = 1600;
        const PHOTO_JPEG_QUALITY = 0.8;
        function compressImageFile(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => {
                    const img = new Image();
                    img.onload = () => {
                        const ratio = Math.min(1, PHOTO_MAX_EDGE / Math.max(img.width, img.height));
                        const w = Math.round(img.width * ratio);
                        const h = Math.round(img.height * ratio);
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        try {
                            resolve(canvas.toDataURL('image/jpeg', PHOTO_JPEG_QUALITY));
                        } catch (e) {
                            resolve(reader.result); // fall back to raw
                        }
                    };
                    img.onerror = () => resolve(reader.result);
                    img.src = reader.result;
                };
                reader.onerror = () => resolve(null);
                reader.readAsDataURL(file);
            });
        }

        function handleEditPhotoUpload(kind, input) {
            const files = Array.from(input.files || []);
            if (!files.length) return;
            Promise.all(files.map(compressImageFile)).then(results => {
                editPhotoState[kind] = editPhotoState[kind].concat(results.filter(Boolean));
                renderEditPhotos();
                input.value = '';
            });
        }

        function removeEditPhoto(kind, index) {
            editPhotoState[kind].splice(index, 1);
            renderEditPhotos();
        }

        // Idempotent migration: ensure every saved document inside a job has a
        // stable `id` so chip clicks can match reliably. Old rows written before
        // ids were required get a synthesized id based on createdAt + index.
        function migrateDocumentIds(job) {
            if (!job || !job.documents) return false;
            let changed = false;
            ['estimates', 'invoices', 'waivers'].forEach(kind => {
                const list = job.documents[kind];
                if (!Array.isArray(list)) return;
                list.forEach((doc, i) => {
                    if (!doc) return;
                    if (!doc.id) {
                        const stamp = doc.createdAt ? Date.parse(doc.createdAt) || Date.now() : Date.now();
                        doc.id = 'doc_' + stamp + '_' + i;
                        changed = true;
                    }
                });
            });
            if (changed) {
                CL_DATA.updateJob(job.id, { documents: job.documents });
            }
            return changed;
        }

        function saveJobEdit(id) {
            // Validate before persisting. (#9)
            const name = document.getElementById('editName').value.trim();
            if (!name) { showToast('Customer name is required', 'error'); return; }

            const numField = (elId, label) => {
                const raw = document.getElementById(elId).value;
                if (raw === '' || raw == null) return '';
                const n = parseFloat(raw);
                if (isNaN(n) || n < 0) { showToast(`${label} must be zero or positive`, 'error'); return undefined; }
                return String(n);
            };

            const quote = numField('editQuote', 'Quote');
            const paid = numField('editPaid', 'Amount Paid');
            const duration = numField('editDuration', 'Duration');
            const sqft = numField('editSqft', 'Sq Ft');
            if (quote === undefined || paid === undefined || duration === undefined || sqft === undefined) return;

            const updates = {
                customerName: name,
                customerPhone: document.getElementById('editPhone').value.trim(),
                customerEmail: document.getElementById('editEmail').value.trim(),
                quoteAmount: quote,
                address: document.getElementById('editAddress').value.trim(),
                serviceType: document.getElementById('editService').value.trim(),
                jobCategory: document.getElementById('editCategory').value,
                jobDate: document.getElementById('editDate').value,
                jobTime: document.getElementById('editTime').value,
                jobDuration: duration,
                squareFootage: sqft,
                status: document.getElementById('editStatus').value,
                paymentStatus: document.getElementById('editPayment').value,
                amountPaid: paid,
                followUpDate: document.getElementById('editFollowUp').value,
                notes: document.getElementById('editNotes').value.trim(),
                beforePhotos: editPhotoState.before,
                afterPhotos: editPhotoState.after
            };
            CL_DATA.updateJob(id, updates);
            loadData();
            updateStats();
            renderJobs();
            showToast('Job updated!');
            openJobModal(id); // Reopen detail view
        }

            if (!job) return;
            safeSet('cl-invoice-prefill', {
                name: job.customerName || '',
                address: job.address || '',
                phone: job.customerPhone || '',
                squareFootage: job.squareFootage || '',
                quoteAmount: job.quoteAmount || '',
                jobDuration: job.jobDuration || '',
                notes: job.notes || ''
            });
            closeJobModal();
            window.location.href = 'invoice.html';
        }

        function markComplete(id) {
            CL_DATA.updateJob(id, { status: 'completed' });
            loadData();
            updateStats();
            renderJobs();
        }

        function markScheduled(id) {
            CL_DATA.updateJob(id, { status: 'scheduled' });
            loadData();
            updateStats();
            renderJobs();
        }
        
        // Soft delete with a 6-second Undo toast. (#13) Restore re-creates
        // the job and clears its tombstone so cloud sync doesn't wipe it again.
        function deleteJob(id) {
            const snapshot = CL_DATA.findJob(id);
            if (!snapshot) return;
            if (!confirm('Delete this job?')) return;
            CL_DATA.deleteJob(id);
            loadData();
            updateStats();
            renderJobs();
            showUndoToast('Job deleted', () => restoreDeletedJob(snapshot));
        }

        function restoreDeletedJob(job) {
            // Remove the tombstone so the restored job won't be re-deleted on
            // the next cloud merge, then re-add.
            const deleted = CL_DATA.getDeletedJobs().filter(d => d.id !== job.id);
            CL_DATA.saveDeletedJobs(deleted);
            CL_DATA.addJob({ ...job, lastUpdated: new Date().toISOString() });
            loadData();
            updateStats();
            renderJobs();
            showToast('Job restored');
        }

        // Compact toast with an Undo action. Isolated from `showToast` in
        // utils.js because that helper doesn't render interactive children.
        function showUndoToast(message, onUndo, timeoutMs = 6000) {
            const existing = document.getElementById('sp-undo-toast');
            if (existing) existing.remove();
            const t = document.createElement('div');
            t.id = 'sp-undo-toast';
            t.setAttribute('role', 'status');
            t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#f8fafc;padding:10px 12px;border-radius:999px;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.35);display:flex;gap:10px;align-items:center;opacity:0;transition:opacity 0.25s ease, transform 0.25s ease;';
            const msg = document.createElement('span');
            msg.textContent = message;
            const btn = document.createElement('button');
            btn.textContent = 'Undo';
            btn.style.cssText = 'background:#0ea5e9;color:#fff;border:none;padding:6px 12px;border-radius:999px;cursor:pointer;font-weight:600;';
            let done = false;
            const close = () => {
                if (done) return;
                done = true;
                t.style.opacity = '0';
                t.style.transform = 'translateX(-50%) translateY(10px)';
                setTimeout(() => t.remove(), 300);
            };
            btn.addEventListener('click', () => { close(); try { onUndo(); } catch (e) { console.error(e); } });
            t.appendChild(msg);
            t.appendChild(btn);
            document.body.appendChild(t);
            requestAnimationFrame(() => {
                t.style.opacity = '1';
                t.style.transform = 'translateX(-50%) translateY(0)';
            });
            setTimeout(close, timeoutMs);
        }

        // Add single job to Google Calendar
        async function addToGoogleCalendar(id) {
            const job = jobs.find(j => j.id === id);
            if (!job || !job.jobDate) return;

            // If connected, use API. On 401/403 treat the token as dead so we
            // stop retrying silently with stale credentials. (#8)
            if (accessToken && tokenExpiry > Date.now()) {
                try {
                    const result = await createCalendarEvent(job);
                    CL_DATA.updateJob(id, { googleEventId: result.id });
                    loadData();
                    alert('Added to Google Calendar!');
                    return;
                } catch (err) {
                    const status = err && (err.status || (err.result && err.result.error && err.result.error.code));
                    if (status === 401 || status === 403) {
                        invalidateCalendarToken();
                        showToast('Calendar session expired — sign in again', 'error');
                    } else {
                        console.error('API error, falling back to URL', err);
                    }
                }
            }

            // Fallback to URL — parse jobTime defensively so 'HH:MM AM/PM'
            // values don't produce malformed dates. (#15)
            const jobDate = job.jobDate.replace(/-/g, '');
            let startH = 9, startM = 0;
            const parsed = parseJobTime(job.jobTime);
            if (parsed) { startH = parsed.h; startM = parsed.m; }
            const pad = n => String(n).padStart(2, '0');
            const startTime = pad(startH) + pad(startM) + '00';
            const endH = (startH + 2) % 24;
            const endTime = pad(endH) + pad(startM) + '00';

            const title = encodeURIComponent(`🚿 ${job.serviceType || 'Pressure Wash'} - ${job.customerName}`);
            const dates = `${jobDate}T${startTime}/${jobDate}T${endTime}`;
            const details = encodeURIComponent(
                `Customer: ${job.customerName}\nPhone: ${job.customerPhone}\n` +
                (job.quoteAmount ? `Quote: $${job.quoteAmount}\n` : '') +
                (job.notes ? `Notes: ${job.notes}` : '')
            );
            const location = job.address ? encodeURIComponent(job.address) : '';

            window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&location=${location}`, '_blank');
        }

        // Create event via API
        async function createCalendarEvent(job) {
            let startHour = 9, startMin = 0;
            const parsed = parseJobTime(job.jobTime);
            if (parsed) { startHour = parsed.h; startMin = parsed.m; }

            const startDate = new Date(job.jobDate + 'T00:00:00');
            startDate.setHours(startHour, startMin, 0);
            
            const endDate = new Date(startDate);
            endDate.setHours(endDate.getHours() + 2);

            const event = {
                summary: `🚿 ${job.serviceType || 'Pressure Wash'} - ${job.customerName}`,
                location: job.address || '',
                description: `Customer: ${job.customerName}\nPhone: ${job.customerPhone}\n` +
                    (job.quoteAmount ? `Quote: $${job.quoteAmount}\n` : '') +
                    (job.notes ? `Notes: ${job.notes}` : ''),
                start: {
                    dateTime: startDate.toISOString(),
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                },
                end: {
                    dateTime: endDate.toISOString(),
                    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
                },
                reminders: {
                    useDefault: false,
                    overrides: [{ method: 'popup', minutes: 60 }, { method: 'popup', minutes: 15 }]
                }
            };

            const response = await gapi.client.calendar.events.insert({
                calendarId: 'primary',
                resource: event
            });

            return response.result;
        }

        // (#3) `syncAllToGCal` was removed — no UI element on this page ever
        // called it and its `syncBtn` target didn't exist. Use single-job
        // `addToGoogleCalendar(id)` from the detail modal instead.

        // ── Document Functions ──────────────────────────────────
        function openDocumentForm(type, jobId) {
            closeJobModal();
            if (type === 'estimate') {
                // Pre-fill and go to estimate page
                const job = jobs.find(j => j.id === jobId);
                if (job) {
                    safeSet('cl-estimate-prefill', {
                        name: job.customerName || '',
                        address: job.address || '',
                        squareFootage: job.squareFootage || '',
                        serviceType: job.serviceType || '',
                        notes: job.notes || '',
                        jobCategory: job.jobCategory || ''
                    });
                }
                window.location.href = `estimate.html?jobId=${jobId}`;
            } else if (type === 'invoice') {
                const job = jobs.find(j => j.id === jobId);
                if (job) {
                    safeSet('cl-invoice-prefill', {
                        name: job.customerName || '',
                        address: job.address || '',
                        phone: job.customerPhone || '',
                        squareFootage: job.squareFootage || '',
                        quoteAmount: job.quoteAmount || '',
                        jobDuration: job.jobDuration || '',
                        notes: job.notes || ''
                    });
                }
                window.location.href = `invoice.html?jobId=${jobId}`;
            } else if (type === 'waiver') {
                window.location.href = `waiver.html?jobId=${jobId}`;
            }
        }

        function viewDocument(jobId, docType, index) {
            const job = jobs.find(j => j.id === jobId);
            if (!job || !job.documents || !job.documents[docType] || !job.documents[docType][index]) {
                alert('Document not found');
                return;
            }

            const doc = job.documents[docType][index];
            const docContent = document.getElementById('documentContent');
            const docTitle = document.getElementById('documentModal-title');

            const typeNames = { estimates: 'Estimate', invoices: 'Invoice', waivers: 'Waiver' };
            docTitle.textContent = `${typeNames[docType]} ${index + 1}`;

            // Estimates/invoices are editable; waivers stay view-only.
            const editPage = docType === 'estimates' ? 'estimate.html'
                           : docType === 'invoices' ? 'invoice.html'
                           : null;
            const editHref = editPage ? `${editPage}?jobId=${encodeURIComponent(jobId)}&docId=${encodeURIComponent(doc.id)}` : null;

            // Prefer the compact formState preview; fall back to the legacy PNG
            // when an older entry still has one.
            let preview = '';
            if (doc.pdfDataUrl) {
                preview = `
                    <div class="text-center">
                        <img src="${doc.pdfDataUrl}" alt="Document" style="max-width: 100%; border: 1px solid #475569; border-radius: 8px;">
                    </div>`;
            } else if (doc.formState || doc.summary) {
                const s = doc.summary || {};
                const fs = doc.formState || {};
                const services = Array.isArray(fs.services) ? fs.services : [];
                preview = `
                    <div class="bg-slate-700/40 p-4 rounded-xl">
                        <p class="text-xl font-bold">${s.customerName || fs.customerName || job.customerName || 'Customer'}</p>
                        ${s.number ? `<p class="text-xs text-gray-400">#${s.number}</p>` : ''}
                        ${services.length ? `
                            <ul class="mt-3 text-sm space-y-1">
                                ${services.map(x => `<li>• ${x.description || 'Service'} — ${x.squareFootage || '?'} sq ft</li>`).join('')}
                            </ul>
                        ` : ''}
                        ${s.total != null ? `<p class="mt-3 text-2xl font-bold text-green-400">$${Number(s.total).toFixed(2)}</p>` : ''}
                        ${fs.notes ? `<p class="mt-2 text-sm text-gray-300">${fs.notes}</p>` : ''}
                    </div>`;
            } else {
                preview = `
                    <div class="text-center text-gray-400 py-8">
                        <i class="fas fa-file-alt text-4xl mb-3"></i>
                        <p>Document preview not available</p>
                    </div>`;
            }

            const actions = `
                <div class="flex gap-2 mt-4">
                    ${editHref ? `
                        <a href="${editHref}" class="flex-1 bg-primary text-white py-3 rounded-xl font-semibold text-center">
                            <i class="fas fa-edit mr-2"></i>Edit
                        </a>
                    ` : ''}
                    ${doc.pdfDataUrl ? `
                        <a href="${doc.pdfDataUrl}" download="${typeNames[docType]}-${job.customerName || 'document'}.png" class="flex-1 bg-slate-600 text-white py-3 rounded-xl font-semibold text-center">
                            <i class="fas fa-download mr-2"></i>Download
                        </a>
                    ` : ''}
                    <button onclick="deleteDocument('${jobId}', '${docType}', '${doc.id}')" class="flex-1 bg-red-600/20 text-red-400 py-3 rounded-xl font-semibold border border-red-600/30">
                        <i class="fas fa-trash mr-2"></i>Delete
                    </button>
                </div>
                <p class="text-xs text-gray-500 text-center mt-3">
                    ${doc.createdAt ? `Created: ${new Date(doc.createdAt).toLocaleString()}` : ''}
                    ${doc.updatedAt ? ` • Updated: ${new Date(doc.updatedAt).toLocaleString()}` : ''}
                </p>
            `;

            docContent.innerHTML = preview + actions;
            document.body.classList.add('modal-open');
            openModal('documentModal');
        }

        // ── Create Customer from Job ─────────────────────────────
        function createCustomerFromJob(jobId) {
            const job = jobs.find(j => j.id === jobId);
            if (!job) return;

            // Already linked to an existing customer record?
            if (job.customerId) {
                const existing = CL_DATA.findCustomer(job.customerId);
                if (existing) {
                    showToast('Customer already linked', 'info');
                    return;
                }
            }

            // Enough data to create a customer directly?
            if (job.customerName && job.customerName.trim()) {
                const cust = CL_DATA.findOrCreateCustomer(
                    job.customerName.trim(),
                    job.customerPhone || '',
                    job.customerEmail || '',
                    job.address || ''
                );
                if (cust) {
                    CL_DATA.updateJob(jobId, { customerId: cust.id });
                    loadData();
                    showToast('Customer created');
                    openJobModal(jobId);
                }
                return;
            }

            // Otherwise prompt inline — never silently create a blank record.
            openCreateCustomerPrompt(jobId, job);
        }

        function openCreateCustomerPrompt(jobId, job) {
            document.getElementById('jobModal-title').textContent = 'Create Customer';
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-3">
                    <p class="text-xs text-gray-400">This job has no customer name. Fill in the details to create a record.</p>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Name <span class="text-red-400">*</span></label>
                        <input type="text" id="ccName" value="${(job.customerName || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Phone</label>
                            <input type="tel" id="ccPhone" value="${(job.customerPhone || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Email</label>
                            <input type="email" id="ccEmail" value="${(job.customerEmail || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Address</label>
                        <input type="text" id="ccAddress" value="${(job.address || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="openJobModal('${jobId}')" class="flex-1 bg-slate-600 text-white py-3 rounded-xl font-semibold">Cancel</button>
                        <button onclick="submitCreateCustomer('${jobId}')" class="flex-1 bg-primary text-white py-3 rounded-xl font-semibold">Create</button>
                    </div>
                </div>
            `;
            openModal('jobModal');
        }

        function submitCreateCustomer(jobId) {
            const name = document.getElementById('ccName').value.trim();
            if (!name) { showToast('Name is required', 'error'); return; }
            const phone = document.getElementById('ccPhone').value.trim();
            const email = document.getElementById('ccEmail').value.trim();
            const address = document.getElementById('ccAddress').value.trim();
            const cust = CL_DATA.findOrCreateCustomer(name, phone, email, address);
            if (!cust) { showToast('Could not create customer', 'error'); return; }
            CL_DATA.updateJob(jobId, {
                customerId: cust.id,
                customerName: name,
                customerPhone: phone || undefined,
                customerEmail: email || undefined,
                address: address || undefined
            });
            loadData();
            showToast('Customer created');
            openJobModal(jobId);
        }

        function closeDocumentModal() {
            document.body.classList.remove('modal-open');
            closeModal('documentModal');
        }

        // Delete by stable doc.id rather than list index so concurrent cloud
        // merges (which can reorder) don't cause us to delete the wrong entry. (#5)
        function deleteDocument(jobId, docType, docId) {
            if (!confirm('Delete this document?')) return;
            const job = jobs.find(j => j.id === jobId);
            if (!job || !job.documents || !Array.isArray(job.documents[docType])) return;
            const idx = job.documents[docType].findIndex(d => d && d.id === docId);
            if (idx < 0) { showToast('Document not found', 'error'); return; }
            job.documents[docType].splice(idx, 1);
            CL_DATA.updateJob(job.id, { documents: job.documents });
            loadData();
            closeDocumentModal();
            showToast('Document deleted');
        }

        // Refresh on visibility
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                loadData();
                updateStats();
                renderJobs();
            }
        });
    </script>
