<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#0b0e14">
    <title>Calendar - Clearline</title>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        colors: {
                            primary: '#0ea5e9',
                            secondary: '#38bdf8',
                            dark: '#0f172a',
                            darker: '#020617',
                            accent: '#06b6d4',
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="app.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="data-migration.js"></script>
    <script src="firebase-sync.js?v=3"></script>
    <style>
        .calendar-day {
            aspect-ratio: 1;
            min-height: 40px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            cursor: pointer;
        }
        .calendar-day:hover {
            background: rgba(255,255,255,0.05);
            transform: scale(1.05);
        }
        .calendar-day:active {
            transform: scale(0.92);
            opacity: 0.8;
        }
        .calendar-day.today {
            border: 2px solid #0ea5e9;
            box-shadow: 0 0 8px rgba(14, 165, 233, 0.3);
        }
        .calendar-day.has-jobs {
            background: rgba(139, 92, 246, 0.2);
        }
        .job-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }
        .job-dot.scheduled { background: #8b5cf6; }
        .job-dot.completed { background: #10b981; }
        .job-dot.followup { background: #f59e0b; }
        .job-dot.new { background: #3b82f6; }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            animation: modalFadeIn 0.2s ease;
        }
        .modal.show,
        .modal.modal-open,
        .modal:not([hidden]) { display: flex !important; }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 10px 10px 0 0;
            width: 100%;
            max-height: 60vh;
            overflow-y: auto;
            padding-bottom: var(--safe-bottom);
            animation: modalSlideUp 0.25s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-new { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-followup,
        .status-quoted { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-scheduled { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .section-title {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: #64748b;
        }
        .view-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .view-btn:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: #cbd5e1;
        }
        .view-btn.active {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.35);
        }
        .week-day-header {
            text-align: center;
            padding: 8px 4px;
            border-radius: 8px;
        }
        .week-day-header.today {
            background: rgba(14, 165, 233, 0.2);
        }
        #upcomingJobs .glass-card,
        #todayJobsCard .glass-card {
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .cal-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cal-item:last-child { border-bottom: none; }
        .cal-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(124,58,237,0.25);
            color: #c4b5fd;
        }
        .cal-item.lead .cal-item-icon {
            background: rgba(245,158,11,0.25);
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="app-header-inner" style="justify-content:space-between;max-width:500px;padding-left:10px;padding-right:10px;">
            <h1 style="margin:0;">Calendar</h1>
            <div style="display:flex;gap:8px;">
                <button type="button" class="header-icon-btn" onclick="goToToday()" aria-label="Jump to today"><i class="fas fa-search"></i></button>
                <button type="button" class="header-icon-btn" onclick="goToToday()" aria-label="Today"><i class="fas fa-calendar-day"></i></button>
            </div>
        </div>
    </header>

    <main class="app-content">
      <div class="content-wrapper">
        <!-- View Tabs -->
        <div class="flex gap-1 mb-3 bg-slate-800/60 p-1 rounded-xl">
            <button onclick="setView('month')" data-view="month" class="view-btn flex-1 py-2 rounded-lg text-xs font-semibold text-gray-400 active">Month</button>
            <button onclick="setView('week')" data-view="week" class="view-btn flex-1 py-2 rounded-lg text-xs font-semibold text-gray-400">Week</button>
            <button onclick="setView('day')" data-view="day" class="view-btn flex-1 py-2 rounded-lg text-xs font-semibold text-gray-400">Day</button>
        </div>

        <!-- Navigation -->
        <div class="flex items-center justify-between mb-3">
            <button onclick="navigate(-1)" class="p-2 text-primary action-btn rounded-xl">
                <i class="fas fa-chevron-left text-lg"></i>
            </button>
            <div class="text-center">
                <button onclick="goToToday()" class="text-lg font-semibold" id="dateTitle"></button>
                <p class="text-[10px] text-gray-500" id="dateSubtitle">Tap a day to view or add</p>
            </div>
            <button onclick="navigate(1)" class="p-2 text-primary action-btn rounded-xl">
                <i class="fas fa-chevron-right text-lg"></i>
            </button>
        </div>

        <!-- Calendar Views Container -->
        <div id="calendarContainer" class="glass-card rounded-2xl p-3 mb-3"></div>

        <!-- Legend (for month view) -->
        <div id="calendarLegend" class="flex justify-center gap-4 mb-3 text-[10px]">
            <div class="flex items-center gap-1">
                <span class="job-dot scheduled"></span>
                <span class="text-gray-500">Scheduled</span>
            </div>
            <div class="flex items-center gap-1">
                <span class="job-dot completed"></span>
                <span class="text-gray-500">Completed</span>
            </div>
            <div class="flex items-center gap-1">
                <span class="job-dot followup"></span>
                <span class="text-gray-500">Lead / estimate</span>
            </div>
        </div>

        <div class="section-row">
            <h3 class="section-title">Today</h3>
            <span id="todayCalendarLabel" class="text-xs text-gray-500"></span>
        </div>
        <div id="todayJobsCard" class="space-y-2 mb-3"></div>

        <div class="section-row">
            <h3 class="section-title">Upcoming</h3>
            <button type="button" onclick="openUpcomingList()" class="section-link" style="background:none;border:none;cursor:pointer;">View all</button>
        </div>
        <div id="upcomingJobs" class="space-y-2 pb-4"></div>
      </div>
    </main>

    <!-- Day Detail Modal -->
    <div id="dayModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="dayModal-title" hidden>
        <div class="modal-content" role="document">
            <div class="modal-header sticky top-0 bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 id="dayModal-title" class="text-lg font-bold"></h2>
                <button type="button" class="modal-close-btn text-gray-400 text-2xl" onclick="closeDayModal()" aria-label="Close">&times;</button>
            </div>
            <div id="dayContent" class="p-4"></div>
        </div>
    </div>

    <!-- Add lead (estimate visit) from a calendar day -->
    <div id="addLeadVisitModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="addLeadVisitModal-title" hidden>
        <div class="modal-content">
            <div class="modal-header sticky top-0 bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 id="addLeadVisitModal-title" class="text-lg font-bold">Estimate visit (lead)</h2>
                <button type="button" class="modal-close-btn text-gray-400 text-2xl" onclick="closeAddLeadVisitModal()" aria-label="Close">&times;</button>
            </div>
            <div class="p-4 space-y-3">
                <p class="text-sm text-gray-400">Shows on this day as a <strong class="text-amber-400">lead</strong> and appears under Jobs → Leads. Default time is 11:30 — change if needed.</p>
                <input type="hidden" id="addLeadVisitDateStr" value="">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Time</label>
                    <input type="time" id="addLeadVisitTime" value="11:30" class="w-full p-3 rounded-lg bg-slate-700/80 border border-slate-600 text-white">
                </div>
                <input type="hidden" id="addLeadVisitCustomerId" value="">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Customer name <span class="text-gray-500">(optional)</span></label>
                    <input type="text" id="addLeadVisitName" list="addLeadVisitCustomerOptions" oninput="syncLeadVisitCustomerSelection()" placeholder="Name" class="w-full p-3 rounded-lg bg-slate-700/80 border border-slate-600 text-white" autocomplete="name">
                    <datalist id="addLeadVisitCustomerOptions"></datalist>
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Phone <span class="text-gray-500">(optional)</span></label>
                    <input type="tel" id="addLeadVisitPhone" class="w-full p-3 rounded-lg bg-slate-700/80 border border-slate-600 text-white" autocomplete="tel">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Email <span class="text-gray-500">(optional)</span></label>
                    <input type="email" id="addLeadVisitEmail" class="w-full p-3 rounded-lg bg-slate-700/80 border border-slate-600 text-white" autocomplete="email">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Address <span class="text-gray-500">(optional)</span></label>
                    <input type="text" id="addLeadVisitAddress" class="w-full p-3 rounded-lg bg-slate-700/80 border border-slate-600 text-white" autocomplete="street-address">
                </div>
                <button type="button" onclick="confirmAddLeadVisit()" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-semibold">
                    <i class="fas fa-file-alt mr-2"></i>Create &amp; open estimate
                </button>
                <button type="button" onclick="closeAddLeadVisitModal()" class="w-full bg-slate-600 text-white py-3 rounded-xl font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Use CL_DATA for jobs
        let jobs = [];
        let customers = [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
let currentView = safeGet('cl-calendar-view', null) || localStorage.getItem('cl-calendar-view') || 'month';
        let selectedDate = new Date(); // For day/week view
        let calendarJobsCache = {};

        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                           'July', 'August', 'September', 'October', 'November', 'December'];
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        function loadData() {
            jobs = CL_DATA.getJobs();
            customers = CL_DATA.getCustomers();
        }

        function buildLeadVisitAutocomplete() {
            const list = document.getElementById('addLeadVisitCustomerOptions');
            if (!list) return;
            list.innerHTML = customers
                .filter(c => c && c.name)
                .sort((a, b) => (a.name || '').localeCompare(b.name || ''))
                .map(c => `<option value="${String(c.name || '').replace(/"/g, '&quot;')}" label="${String(c.phone || c.email || '').replace(/"/g, '&quot;')}"></option>`)
                .join('');
        }

        function syncLeadVisitCustomerSelection() {
            const nameEl = document.getElementById('addLeadVisitName');
            const idEl = document.getElementById('addLeadVisitCustomerId');
            if (!nameEl || !idEl) return;
            const name = nameEl.value.trim().toLowerCase();
            const exact = customers.find(c => (c.name || '').trim().toLowerCase() === name);
            if (!exact) {
                idEl.value = '';
                return;
            }
            idEl.value = exact.id;
            const p = document.getElementById('addLeadVisitPhone');
            const e = document.getElementById('addLeadVisitEmail');
            const a = document.getElementById('addLeadVisitAddress');
            if (p && !p.value.trim() && exact.phone) p.value = exact.phone;
            if (e && !e.value.trim() && exact.email) e.value = exact.email;
            if (a && !a.value.trim() && exact.address) a.value = exact.address;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            // Load saved view preference
            const settings = safeGet('cl-settings', {});
            if (settings.calendarView) currentView = settings.calendarView;
            
            document.querySelector(`[data-view="${currentView}"]`)?.classList.add('active');
            renderView();
            renderTodayJobs();
            renderUpcomingJobs();
            setActiveNav();
        });

        function setView(view) {
            currentView = view;
localStorage.setItem('cl-calendar-view', view);
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });
            renderView();
        }

        function navigate(delta) {
            if (currentView === 'month') {
                currentMonth += delta;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            } else if (currentView === 'week') {
                selectedDate.setDate(selectedDate.getDate() + (delta * 7));
            } else {
                selectedDate.setDate(selectedDate.getDate() + delta);
            }
            renderView();
        }

        function goToToday() {
            const today = new Date();
            currentMonth = today.getMonth();
            currentYear = today.getFullYear();
            selectedDate = new Date();
            renderView();
        }

        function renderView() {
            if (currentView === 'month') renderMonthView();
            else if (currentView === 'week') renderWeekView();
            else renderDayView();
        }

        function renderMonthView() {
            document.getElementById('dateTitle').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            document.getElementById('dateSubtitle').textContent = 'Tap a day to view or add';
            document.getElementById('calendarLegend').style.display = 'flex';

            const container = document.getElementById('calendarContainer');
            container.innerHTML = `
                <div class="grid grid-cols-7 gap-0.5 mb-1">
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">S</div>
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">M</div>
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">T</div>
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">W</div>
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">T</div>
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">F</div>
                    <div class="text-center text-[10px] text-gray-500 font-semibold py-1">S</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-0.5"></div>
            `;
            
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Get first day of month and total days
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Get jobs for this month
            const monthJobs = getJobsForMonth(currentYear, currentMonth);
            calendarJobsCache = {};

            // Empty cells for days before first of month
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-day';
                grid.appendChild(emptyCell);
            }

            // Day cells
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cellDate = new Date(currentYear, currentMonth, day);
                const isToday = cellDate.getTime() === today.getTime();
                const dayJobs = monthJobs[dateStr] || [];
                calendarJobsCache[dateStr] = dayJobs;

                const cell = document.createElement('div');
                cell.className = `calendar-day rounded-lg flex flex-col items-center justify-center cursor-pointer
                    ${isToday ? 'today' : 'bg-slate-800/50'}
                    ${dayJobs.length > 0 ? 'has-jobs' : ''}`;
                
                cell.innerHTML = `
                    <span class="text-sm ${isToday ? 'text-primary font-bold' : ''}">${day}</span>
                    ${dayJobs.length > 0 ? `
                        <div class="flex gap-1 mt-1">
                            ${dayJobs.slice(0, 3).map(j => `<span class="job-dot ${j.status}"></span>`).join('')}
                        </div>
                    ` : ''}
                `;

                // All days are clickable now
                cell.onclick = () => openDayModal(dateStr);

                grid.appendChild(cell);
            }
        }

        function getJobsForMonth(year, month) {
            const result = {};
            
            jobs.forEach(j => {
                // Only show SCHEDULED or COMPLETED jobs on calendar (not leads)
                // Leads use follow-up dates instead
                if (j.jobDate && (j.status === 'scheduled' || j.status === 'completed')) {
                    const jobDate = new Date(j.jobDate + 'T12:00:00');
                    if (jobDate.getFullYear() === year && jobDate.getMonth() === month) {
                        if (!result[j.jobDate]) result[j.jobDate] = [];
                        result[j.jobDate].push({
                            ...j,
                            name: j.customerName,
                            phone: j.customerPhone,
                            type: 'job'
                        });
                    }
                }
                
                // Check follow-up dates (for leads) - show as reminders
                if (j.followUpDate && j.status === 'new') {
                    const followDate = new Date(j.followUpDate + 'T12:00:00');
                    if (followDate.getFullYear() === year && followDate.getMonth() === month) {
                        if (!result[j.followUpDate]) result[j.followUpDate] = [];
                        result[j.followUpDate].push({
                            ...j,
                            name: j.customerName,
                            phone: j.customerPhone,
                            type: 'followup',
                            status: 'followup' // Override status for dot color
                        });
                    }
                }
            });

            return result;
        }

        function buildDayJobs(dateStr) {
            // Only show scheduled/completed jobs, not leads
            const dayJobs = jobs
                .filter(j => j.jobDate === dateStr && (j.status === 'scheduled' || j.status === 'completed'))
                .map(j => ({ ...j, name: j.customerName, phone: j.customerPhone, type: 'job' }));
            // Follow-ups for leads
            const followups = jobs
                .filter(j => j.followUpDate === dateStr && j.status === 'new')
                .map(j => ({ ...j, name: j.customerName, phone: j.customerPhone, type: 'followup' }));
            return [...dayJobs, ...followups];
        }

        function renderWeekView() {
            document.getElementById('calendarLegend').style.display = 'none';
            // Get start of week (Sunday)
            const startOfWeek = new Date(selectedDate);
            startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
            
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            
            document.getElementById('dateTitle').textContent = 
                `${monthNames[startOfWeek.getMonth()]} ${startOfWeek.getDate()} - ${endOfWeek.getDate()}`;
            document.getElementById('dateSubtitle').textContent = 'Week view';

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let html = '<div class="space-y-2">';
            calendarJobsCache = {};
            
            for (let i = 0; i < 7; i++) {
                const day = new Date(startOfWeek);
                day.setDate(day.getDate() + i);
                const dateStr = day.toISOString().split('T')[0];
                const isToday = day.getTime() === today.getTime();
                const dayJobs = buildDayJobs(dateStr);
                calendarJobsCache[dateStr] = dayJobs;
                
                html += `
                    <div class="p-2 rounded-xl ${isToday ? 'bg-primary/20 border border-primary/30' : 'bg-slate-800/50'}" onclick="openDayModal('${dateStr}')">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-semibold ${isToday ? 'text-primary' : ''}">                                ${dayNames[i]} ${day.getDate()}
                            </span>
                            <span class="text-xs text-gray-500">${dayJobs.length} item${dayJobs.length !== 1 ? 's' : ''}</span>
                        </div>
                        ${dayJobs.length > 0 ? `
                            <div class="space-y-1">
                                ${dayJobs.slice(0, 3).map(j => `
                                    <div class="text-xs flex items-center gap-2 py-1">
                                        <span class="w-1.5 h-1.5 rounded-full bg-${j.status === 'scheduled' ? 'purple' : j.status === 'completed' ? 'green' : 'yellow'}-500"></span>
                                        <span class="truncate">${j.customerName}</span>
                                        ${j.jobTime ? `<span class="text-gray-500 ml-auto">${j.jobTime}</span>` : ''}
                                    </div>
                                `).join('')}
                                ${dayJobs.length > 3 ? `<p class="text-xs text-gray-500">+${dayJobs.length - 3} more</p>` : ''}
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('calendarContainer').innerHTML = html;
        }

        function renderDayView() {
            document.getElementById('calendarLegend').style.display = 'none';
            document.getElementById('dateTitle').textContent = selectedDate.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric'
            });
            document.getElementById('dateSubtitle').textContent = 'Day view';

            const dateStr = selectedDate.toISOString().split('T')[0];
            const dayJobs = buildDayJobs(dateStr);
            calendarJobsCache[dateStr] = dayJobs;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const isToday = selectedDate.getTime() === today.getTime();

            let html = `
                <div class="text-center mb-4">
                    <p class="text-3xl font-bold ${isToday ? 'text-primary' : ''}">${selectedDate.getDate()}</p>
                    <p class="text-gray-400">${dayNames[selectedDate.getDay()]}</p>
                </div>
                <div class="flex flex-col gap-2 mb-4">
                    <button type="button" onclick="addJobForDate('${dateStr}')" class="w-full bg-primary/20 text-primary py-3 rounded-xl font-semibold border border-primary/30">
                        <i class="fas fa-briefcase mr-2"></i>Scheduled job
                    </button>
                    <button type="button" onclick="openAddLeadVisitModal('${dateStr}')" class="w-full bg-amber-500/20 text-amber-400 py-3 rounded-xl font-semibold border border-amber-500/30">
                        <i class="fas fa-user-plus mr-2"></i>Estimate visit (lead)
                    </button>
                </div>
            `;
            
            if (dayJobs.length === 0) {
                html += '<p class="text-center text-gray-500 py-8">No jobs scheduled</p>';
            } else {
                const HOURS = Array.from({ length: 15 }, (_, i) => i + 6); // 6am-8pm
                const byHour = {};
                dayJobs.forEach(job => {
                    const t = (job.jobTime || '').trim();
                    let h = -1;
                    if (/am|pm/i.test(t)) {
                        const m = t.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/i);
                        if (m) {
                            h = parseInt(m[1], 10) % 12;
                            if (m[3].toLowerCase() === 'pm') h += 12;
                        }
                    } else if (/^\d{1,2}:\d{2}/.test(t)) {
                        h = parseInt(t.split(':')[0], 10);
                    }
                    if (h < 0 || h > 23) h = 12;
                    if (!byHour[h]) byHour[h] = [];
                    byHour[h].push(job);
                });
                html += '<div class="space-y-1">';
                HOURS.forEach(hour => {
                    const label = new Date(2000, 0, 1, hour, 0, 0).toLocaleTimeString([], { hour: 'numeric' });
                    const rows = byHour[hour] || [];
                    html += `
                        <div class="grid grid-cols-[52px_1fr] gap-2 items-start py-1">
                            <div class="text-xs text-gray-500 pt-2">${label}</div>
                            <div>${rows.length ? rows.map(job => `
                                <div class="bg-slate-800/60 rounded-xl p-2 mb-2" onclick="openDayModal('${dateStr}')">
                                    <div class="flex justify-between items-start gap-2">
                                        <div class="min-w-0">
                                            <p class="font-semibold truncate">${job.customerName || job.name}</p>
                                            <p class="text-xs text-gray-500">${job.serviceType || (job.type === 'followup' ? 'Estimate visit' : 'Service')}</p>
                                        </div>
                                        <div class="text-right">
                                            ${job.jobTime ? `<p class="text-purple-400 text-xs">${job.jobTime}</p>` : ''}
                                            ${job.quoteAmount ? `<p class="text-green-400 font-semibold text-xs">$${Number(job.quoteAmount || 0).toFixed(2)}</p>` : ''}
                                        </div>
                                    </div>
                                </div>
                            `).join('') : '<div class="h-7 rounded-lg border border-slate-800/70 bg-slate-900/30"></div>'}</div>
                        </div>`;
                });
                html += '</div>';
            }
            
            document.getElementById('calendarContainer').innerHTML = html;
        }

        let selectedDateStr = null;

        function openDayModal(dateStr, jobs) {
            selectedDateStr = dateStr;
            const date = new Date(dateStr + 'T12:00:00');
            document.getElementById('dayModal-title').textContent = date.toLocaleDateString('en-US', { 
                weekday: 'long', 
                month: 'long', 
                day: 'numeric' 
            });

            const content = document.getElementById('dayContent');
            const dayJobs = jobs && Array.isArray(jobs) ? jobs : (calendarJobsCache[dateStr] || buildDayJobs(dateStr));
            
            // Add job button at top
            let html = `
                <div class="flex flex-col gap-2 mb-4">
                    <button type="button" onclick="addJobForDate('${dateStr}')" class="w-full bg-primary text-white py-3 rounded-xl font-semibold">
                        <i class="fas fa-briefcase mr-2"></i>Scheduled job (booked work)
                    </button>
                    <button type="button" onclick="openAddLeadVisitModal('${dateStr}')" class="w-full bg-amber-500/90 text-white py-3 rounded-xl font-semibold border border-amber-400/40">
                        <i class="fas fa-user-plus mr-2"></i>Estimate visit (lead)
                    </button>
                </div>
            `;
            
            if (dayJobs.length === 0) {
                html += '<p class="text-gray-400 text-center py-4">No jobs scheduled</p>';
            } else {
                html += dayJobs.map(job => `
                    <div class="glass-card rounded-xl p-4 mb-3">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="font-bold">${job.name}</h4>
                                <p class="text-sm text-gray-400">${job.serviceType || 'Service'}</p>
                                ${job.jobTime ? `<p class="text-purple-400 text-sm"><i class="fas fa-clock mr-1"></i>${job.jobTime}${job.jobDuration ? ` (${job.jobDuration} hrs)` : ''}</p>` : ''}
                            </div>
                            <span class="status-badge status-${job.status}">${job.status}</span>
                        </div>
                        
                        ${job.type === 'followup' ? `
                            <p class="text-amber-400 text-sm mb-2">
                                <i class="fas fa-user-clock mr-1"></i>Lead — estimate visit
                            </p>
                            <a href="estimate.html?jobId=${encodeURIComponent(job.id)}" class="block w-full text-center bg-amber-600 text-white py-2 rounded-lg text-sm font-semibold mb-2">Open estimate</a>
                        ` : ''}
                        
                        ${job.quoteAmount ? `<p class="text-green-400 font-bold mb-2">$${Number(job.quoteAmount || 0).toFixed(2)}</p>` : ''}
                        ${job.address ? `<p class="text-sm text-gray-400 mb-2"><i class="fas fa-map-marker-alt mr-1"></i>${job.address}</p>` : ''}
                        
                        <div class="flex gap-2 mb-2">
                            <a href="tel:${job.phone}" class="flex-1 bg-green-600 text-white py-2 rounded-lg text-center text-sm">
                                <i class="fas fa-phone mr-1"></i>Call
                            </a>
                            ${job.address ? `
                                <a href="https://maps.google.com/?q=${encodeURIComponent(job.address)}" target="_blank" class="flex-1 bg-purple-600 text-white py-2 rounded-lg text-center text-sm">
                                    <i class="fas fa-directions mr-1"></i>Nav
                                </a>
                            ` : ''}
                        </div>
                        ${job.type === 'job' ? `
                            <button onclick="exportJobToGCal('${job.id}')" class="w-full bg-red-600/20 text-red-400 py-2 rounded-lg text-sm">
                                <i class="fab fa-google mr-1"></i>Add to Google Calendar
                            </button>
                        ` : ''}
                    </div>
                `).join('');
            }
            
            content.innerHTML = html;
            openModal('dayModal');
        }

        function addJobForDate(dateStr) {
            const id = 'job_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
            const nowIso = new Date().toISOString();
            CL_DATA.addJob({
                id,
                customerId: null,
                customerName: '',
                customerPhone: '',
                customerEmail: '',
                address: '',
                serviceType: '',
                jobCategory: '',
                jobDate: dateStr,
                jobTime: '',
                jobDuration: '',
                quoteAmount: '',
                squareFootage: '',
                status: 'scheduled',
                notes: '',
                paymentStatus: 'unpaid',
                dateAdded: nowIso,
                documents: { estimates: [], invoices: [], waivers: [] }
            });
            window.location.href = `estimate.html?jobId=${encodeURIComponent(id)}`;
        }

        function openAddLeadVisitModal(dateStr) {
            document.getElementById('addLeadVisitDateStr').value = dateStr;
            document.getElementById('addLeadVisitTime').value = '11:30';
            document.getElementById('addLeadVisitCustomerId').value = '';
            document.getElementById('addLeadVisitName').value = '';
            document.getElementById('addLeadVisitPhone').value = '';
            document.getElementById('addLeadVisitEmail').value = '';
            document.getElementById('addLeadVisitAddress').value = '';
            buildLeadVisitAutocomplete();
            closeDayModal();
            openModal('addLeadVisitModal');
        }

        function closeAddLeadVisitModal() {
            closeModal('addLeadVisitModal');
        }

        function confirmAddLeadVisit() {
            const dateStr = document.getElementById('addLeadVisitDateStr').value;
            if (!dateStr) {
                showToast('Missing date', 'error');
                return;
            }
            const jobTime = document.getElementById('addLeadVisitTime').value || '';
            const customerName = document.getElementById('addLeadVisitName').value.trim();
            const customerPhone = document.getElementById('addLeadVisitPhone').value.trim();
            const customerEmail = document.getElementById('addLeadVisitEmail').value.trim();
            const customerAddress = document.getElementById('addLeadVisitAddress').value.trim();
            let customerId = document.getElementById('addLeadVisitCustomerId').value || '';
            if (!customerId && customerName) {
                const cust = CL_DATA.findOrCreateCustomer(customerName, customerPhone, customerEmail, customerAddress);
                if (cust) customerId = cust.id;
            }
            const id = 'job_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
            const nowIso = new Date().toISOString();
            CL_DATA.addJob({
                id,
                customerId: customerId || null,
                customerName,
                customerPhone,
                customerEmail,
                address: customerAddress,
                serviceType: '',
                jobCategory: '',
                jobDate: '',
                jobTime,
                jobDuration: '',
                quoteAmount: '',
                squareFootage: '',
                status: 'new',
                notes: '',
                paymentStatus: 'unpaid',
                dateAdded: nowIso,
                followUpDate: dateStr,
                documents: { estimates: [], invoices: [], waivers: [] }
            });
            if (window.CL_FIREBASE && CL_FIREBASE.isSignedIn) {
                CL_FIREBASE.syncToCloud();
            } else if (window.CL_FIREBASE) {
                setTimeout(() => {
                    if (CL_FIREBASE.isSignedIn) CL_FIREBASE.syncToCloud();
                }, 3000);
            }
            closeAddLeadVisitModal();
            window.location.href = `estimate.html?jobId=${encodeURIComponent(id)}`;
        }

        function exportJobToGCal(jobId) {
            const job = jobs.find(j => j.id === jobId);
            if (!job || !job.jobDate) return;

            const jobDate = job.jobDate.replace(/-/g, '');
            let startTime = '090000';
            if (job.jobTime) {
                const [hours, mins] = job.jobTime.split(':');
                startTime = hours.padStart(2, '0') + mins.padStart(2, '0') + '00';
            }
            
            const durationHours = job.jobDuration ? parseFloat(job.jobDuration) : 2;
            const startHour = parseInt(startTime.substring(0, 2));
            const startMin = parseInt(startTime.substring(2, 4));
            let endHour = startHour + Math.floor(durationHours);
            let endMin = startMin + Math.round((durationHours % 1) * 60);
            if (endMin >= 60) { endHour++; endMin -= 60; }
            const endTime = String(endHour).padStart(2, '0') + String(endMin).padStart(2, '0') + '00';

            const title = encodeURIComponent(`Pressure Wash - ${job.customerName}`);
            const dates = `${jobDate}T${startTime}/${jobDate}T${endTime}`;
            const details = encodeURIComponent(
                `Customer: ${job.customerName}\nPhone: ${job.customerPhone}\n` +
                (job.serviceType ? `Service: ${job.serviceType}\n` : '') +
                (job.quoteAmount ? `Quote: $${job.quoteAmount}\n` : '')
            );
            const location = job.address ? encodeURIComponent(job.address) : '';

            window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&location=${location}`, '_blank');
        }

        function closeDayModal() {
            closeModal('dayModal');
        }

        function renderUpcomingJobs() {
            const container = document.getElementById('upcomingJobs');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const scheduled = jobs
                .filter(j => j.jobDate && j.status === 'scheduled')
                .map(j => ({ ...j, dateObj: new Date(j.jobDate + 'T12:00:00'), kind: 'job' }));
            const leadVisits = jobs
                .filter(j => j.status === 'new' && j.followUpDate)
                .map(j => ({ ...j, dateObj: new Date(j.followUpDate + 'T12:00:00'), kind: 'lead' }));

            const upcoming = [...scheduled, ...leadVisits]
                .filter(j => j.dateObj >= today)
                .sort((a, b) => a.dateObj - b.dateObj)
                .slice(0, 8);

            if (upcoming.length === 0) {
                container.innerHTML = `
                    <div class="glass-card rounded-xl p-4 text-center text-gray-400">
                        <i class="fas fa-calendar-check text-3xl mb-2"></i>
                        <p>No upcoming jobs or estimate visits</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="glass-card">
                    ${upcoming.map(job => `
                        <div class="cal-item ${job.kind === 'lead' ? 'lead' : ''}">
                            <span class="cal-item-icon"><i class="fas ${job.kind === 'lead' ? 'fa-file-signature' : 'fa-calendar-alt'}"></i></span>
                            <div style="min-width:0;flex:1;">
                                <p style="font-weight:700;line-height:1.2;">${job.customerName || 'Lead'}</p>
                                <p style="font-size:12px;color:${job.kind === 'lead' ? '#fbbf24' : '#94a3b8'};">${job.kind === 'lead' ? 'Estimate visit' : (job.serviceType || 'Service')}</p>
                            </div>
                            <div style="text-align:right;white-space:nowrap;">
                                <p style="font-size:12px;color:#a78bfa;">${job.dateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}${job.jobTime ? ` · ${job.jobTime}` : ''}</p>
                                ${job.customerPhone ? `<a href="tel:${job.customerPhone}" style="font-size:12px;color:#e2e8f0;"><i class="fas fa-phone mr-1"></i>${job.customerPhone}</a>` : ''}
                            </div>
                            <i class="fas fa-chevron-right text-gray-500 ml-1"></i>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderTodayJobs() {
            const wrap = document.getElementById('todayJobsCard');
            const label = document.getElementById('todayCalendarLabel');
            if (!wrap) return;
            const todayStr = new Date().toISOString().split('T')[0];
            const pretty = new Date(todayStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            if (label) label.textContent = pretty.toUpperCase();
            const todayJobs = buildDayJobs(todayStr).sort((a, b) => (a.jobTime || '').localeCompare(b.jobTime || ''));
            if (!todayJobs.length) {
                wrap.innerHTML = `<div class="glass-card rounded-xl p-3 text-sm text-gray-400 text-center">No items scheduled for today.</div>`;
                return;
            }
            wrap.innerHTML = `
                <div class="glass-card">
                    ${todayJobs.map(job => `
                        <div class="cal-item ${job.type === 'followup' ? 'lead' : ''}" onclick="openDayModal('${todayStr}')">
                            <span class="cal-item-icon"><i class="fas ${job.type === 'followup' ? 'fa-file-signature' : 'fa-calendar-alt'}"></i></span>
                            <div style="min-width:0;flex:1;">
                                <p style="font-weight:700;line-height:1.2;">${job.customerName || job.name || 'Lead'}</p>
                                <p style="font-size:12px;color:#94a3b8;">${job.serviceType || (job.type === 'followup' ? 'Estimate visit' : 'Service')}</p>
                                ${job.jobTime ? `<p style="font-size:12px;color:#a78bfa;"><i class="far fa-clock mr-1"></i>${job.jobTime}</p>` : ''}
                            </div>
                            ${job.quoteAmount ? `<p style="color:#34d399;font-weight:700;">$${Number(job.quoteAmount || 0).toFixed(2)}</p>` : ''}
                            <i class="fas fa-chevron-right text-gray-500 ml-1"></i>
                        </div>
                    `).join('')}
                </div>`;
        }

        function openUpcomingList() {
            const first = jobs
                .filter(j => (j.jobDate && j.status === 'scheduled') || (j.followUpDate && j.status === 'new'))
                .sort((a, b) => (a.jobDate || a.followUpDate || '').localeCompare(b.jobDate || b.followUpDate || ''))[0];
            if (!first) return;
            const dateStr = first.jobDate || first.followUpDate;
            openDayModal(dateStr);
        }

        // Refresh when returning to page
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                loadData();
                renderView();
                renderTodayJobs();
                renderUpcomingJobs();
            }
        });
        window.addEventListener('cl-sync-updated', () => {
            loadData();
            renderView();
            renderTodayJobs();
            renderUpcomingJobs();
        });
    </script>
