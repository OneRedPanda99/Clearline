<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    <title>Sign In - Clearline</title>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="data-migration.js"></script>
    <script src="firebase-sync.js?v=2"></script>
    <script>
        window.tailwind = { config: { theme: { extend: { colors: {
            primary: '#0ea5e9', secondary: '#38bdf8', dark: '#0f172a',
            darker: '#020617', accent: '#06b6d4'
        } } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="app.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(180deg, #0f172a, #020617); min-height: 100dvh; }
        .auth-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .auth-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #f8fafc;
            font-size: 15px;
        }
        .auth-input:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.18); }
        .divider { display: flex; align-items: center; gap: 8px; color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(148,163,184,0.2); }
    </style>
</head>
<body class="text-slate-100">
    <main class="min-h-screen flex items-center justify-center px-5 py-10">
        <div class="auth-card w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold">Clearline</h1>
                <p class="text-slate-400 text-sm mt-1">Sign in to continue</p>
            </div>

            <div id="banner" class="hidden mb-4 p-3 rounded-xl text-sm border"></div>

            <button id="googleBtn" class="w-full bg-white text-slate-900 font-semibold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition">
                <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 20-8.9 20-20 0-1.3-.1-2.3-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.6 19 13 24 13c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.4 6.3 14.7z"/>
                    <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35 26.7 36 24 36c-5.2 0-9.7-3.4-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.6l6.2 5.2c-.4.4 6.6-4.8 6.6-14.8 0-1.3-.1-2.3-.4-3.5z"/>
                </svg>
                Sign in with Google
            </button>
            <p class="text-center text-[11px] text-slate-500 mt-2">Owner accounts only</p>

            <div class="divider my-5"><span>or</span></div>

            <form id="emailForm" class="space-y-3" autocomplete="on">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Username</label>
                    <!-- Plain text, not `type=email`: Managers/Workers sign in
                         with a bare username. firebase-sync.toAuthEmail()
                         appends @clearline.invalid before calling Firebase. -->
                    <input type="text" id="email" class="auth-input" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required>
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Password</label>
                    <input type="password" id="password" class="auth-input" autocomplete="current-password" required>
                </div>
                <button type="submit" id="emailBtn" class="w-full bg-primary hover:bg-sky-600 text-white font-semibold py-3 rounded-xl active:scale-[0.98] transition">
                    Sign In
                </button>
            </form>

            <p id="emailStatus" class="text-center text-xs text-red-400 mt-3 min-h-[1em]"></p>

            <p class="text-center text-[11px] text-slate-500 mt-6">
                Manager & Worker accounts are created by the Owner. Password resets are handled by your Owner or Manager.
            </p>
        </div>
    </main>

    <script>
        // Show context-specific banners from redirect reasons the firebase-sync
        // layer attached to the URL when it signed a user out.
        (function showBanner() {
            const q = new URLSearchParams(location.search);
            const banner = document.getElementById('banner');
            let message = '';
            let tone = 'warn';
            if (q.has('deactivated')) {
                message = 'Your account has been deactivated. Contact your Owner or Manager.';
                tone = 'error';
            } else if (q.has('notprovisioned')) {
                message = 'This account is not set up yet. Ask your Owner to create your user record first.';
                tone = 'warn';
            } else if (q.has('signedout')) {
                message = 'Signed out.';
                tone = 'info';
            }
            if (!message) return;
            const classes = {
                error: 'bg-red-900/40 border-red-500/40 text-red-200',
                warn: 'bg-amber-900/30 border-amber-500/40 text-amber-100',
                info: 'bg-sky-900/30 border-sky-500/40 text-sky-100'
            };
            banner.className = 'mb-4 p-3 rounded-xl text-sm border ' + classes[tone];
            banner.textContent = message;
            banner.classList.remove('hidden');
        })();

        // Route the signed-in user to the right home screen based on their
        // Firestore profile. Owner -> index.html, Manager -> manager-home,
        // Worker -> worker-home. Unknown role falls back to signin (no-op).
        function routeByRole(role) {
            switch ((role || '').toLowerCase()) {
                case 'owner':   window.location.replace('index.html'); return;
                case 'manager': window.location.replace('manager-home.html'); return;
                case 'worker':  window.location.replace('worker-home.html'); return;
                default:        console.warn('Unknown role:', role);
            }
        }

        // If the user is already signed in with a valid profile, bounce
        // them to their home immediately. Handled via cl-profile-updated
        // which firebase-sync dispatches once the profile has loaded.
        window.addEventListener('cl-profile-updated', (e) => {
            const p = e.detail && e.detail.profile;
            if (p && p.role && p.active !== false) routeByRole(p.role);
        });

        document.getElementById('googleBtn').addEventListener('click', async () => {
            const info = await CL_FIREBASE.signInWithGoogle();
            if (!info) return; // error already surfaced
            // handleAuthStateChange will emit cl-profile-updated \u2192 routeByRole.
        });

        const emailForm = document.getElementById('emailForm');
        const emailStatus = document.getElementById('emailStatus');
        const emailBtn = document.getElementById('emailBtn');
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            emailStatus.textContent = '';
            emailBtn.disabled = true;
            emailBtn.textContent = 'Signing in\u2026';
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const res = await CL_FIREBASE.signInWithEmail(email, password);
            emailBtn.disabled = false;
            emailBtn.textContent = 'Sign In';
            if (!res.ok) {
                const human = {
                    'auth/invalid-credential': 'Invalid email or password.',
                    'auth/user-not-found': 'No account with that email.',
                    'auth/wrong-password': 'Incorrect password.',
                    'auth/too-many-requests': 'Too many attempts. Try again later.',
                    'auth/network-request-failed': 'Network error. Try again.'
                }[res.code] || ('Sign-in failed: ' + (res.code || 'unknown'));
                emailStatus.textContent = human;
            }
            // On success, profile load will route via cl-profile-updated.
        });
    </script>
</body>
</html>
