<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1c1f">
    <title>Manager Panel - Clearline</title>
    <script src="config.js"></script>
    <script src="utils.js?v=2"></script>
    <script src="data-migration.js"></script>
    <script src="firebase-sync.js?v=5"></script>
<script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="app.css?v=6">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .perm-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 8px; background: rgba(15,23,42,0.5); margin-bottom: 6px; }
        .perm-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #0ea5e9; }
        .user-card { border-left: 4px solid transparent; }
        .user-card.owner { border-left-color: #fbbf24; }
        .user-card.manager { border-left-color: var(--md-sys-color-secondary); }
        .user-card.worker { border-left-color: #38bdf8; }
        .user-card.inactive { opacity: 0.55; }
        .user-card-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .user-card-actions button { font-size: 12px; font-weight: 600; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; }
        .user-card-actions button.danger { color: #fca5a5; border-color: rgba(239,68,68,0.35); }
        .cert-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; padding: 2px 6px; border-radius: 999px; margin-left: 6px; }
        .cert-badge.expired { background: rgba(239,68,68,0.18); color: #fca5a5; }
        .cert-badge.expiring { background: rgba(245,158,11,0.18); color: #fbbf24; }
        .form-section { border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
        .form-section > summary { cursor: pointer; font-size: 13px; font-weight: 700; color: #cbd5e1; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .form-section > summary::-webkit-details-marker { display: none; }
        .form-section > summary::after { content: '\f078'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 11px; color: #64748b; }
        .form-section[open] > summary::after { content: '\f077'; }
        .form-section .section-body { margin-top: 10px; }
        .cert-row, .equip-add-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
        .cert-row input { flex: 1; }
        .cert-row button, .equip-add-row button { flex-shrink: 0; }
        .equip-check-row { display: flex; align-items: center; gap: 8px; padding: 6px 2px; font-size: 13px; }
        .activity-row { display: flex; justify-content: space-between; gap: 8px; padding: 8px 10px; border-radius: 8px; background: rgba(15,23,42,0.4); font-size: 12px; }
        .activity-row .activity-msg { color: #cbd5e1; }
        .activity-row .activity-meta { color: #64748b; flex-shrink: 0; text-align: right; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-header-inner">
            <a href="index.html" class="header-btn header-btn-left"><i class="fas fa-chevron-left"></i></a>
            <h1>Manager Panel</h1>
        </div>
    </header>

    <main class="app-content">
        <div class="content-wrapper">
            <div id="roleBanner" class="glass-card rounded-xl p-3 mb-3 text-sm text-gray-300"></div>

            <!-- Owner-only: New user buttons -->
            <div id="ownerActions" class="hidden flex gap-2 mb-4">
                <button onclick="openNewUser('manager')" class="btn-secondary btn-sm" style="flex:1;width:auto">
                    <i class="fas fa-user-tie mr-1"></i>New Manager
                </button>
                <button onclick="openNewUser('worker')" class="btn-primary btn-sm" style="flex:1;width:auto">
                    <i class="fas fa-user-plus mr-1"></i>New Worker
                </button>
            </div>

            <section id="usersSection" class="mb-5">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="section-title"><span id="usersLabel">Team</span></h2>
                    <input id="userSearch" placeholder="Search…" oninput="renderUserList()"
                           class="bg-slate-700/60 text-white text-sm rounded-lg px-3 py-1.5 w-32">
                </div>
                <div id="userRoleFilterRow" class="page-tabs page-tabs--pills hidden">
                    <button type="button" class="page-tab active" data-role-filter="all" onclick="setUserRoleFilter('all')">All</button>
                    <button type="button" class="page-tab" data-role-filter="manager" onclick="setUserRoleFilter('manager')">Managers</button>
                    <button type="button" class="page-tab" data-role-filter="worker" onclick="setUserRoleFilter('worker')">Workers</button>
                </div>
                <div class="page-tabs page-tabs--pills">
                    <button type="button" class="page-tab active" data-status-filter="all" onclick="setUserStatusFilter('all')">All</button>
                    <button type="button" class="page-tab" data-status-filter="active" onclick="setUserStatusFilter('active')">Active</button>
                    <button type="button" class="page-tab" data-status-filter="inactive" onclick="setUserStatusFilter('inactive')">Inactive</button>
                </div>
                <div id="userList" class="space-y-2"></div>
                <p id="emptyState" class="hidden text-gray-500 text-sm text-center py-6">
                    No users yet. Create one with the buttons above.
                </p>
            </section>

            <!-- Dedicated Assign Jobs flow: tap the button -> a focused
                 screen lists jobs; tap a job -> assign workers. -->
            <section id="assignEntry" class="mb-5 mt-6">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="section-title">Jobs</h2>
                </div>
                <button type="button" onclick="openAssignScreen()"
                        class="btn-primary" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;">
                    <i class="fas fa-people-arrows"></i> Assign Jobs
                </button>
                <p class="text-xs text-gray-500 mt-2">Open a job to assign it to a worker or manager.</p>
            </section>

            <!-- Assign screen overlay -->
            <div id="assignScreen" class="modal" hidden role="dialog" aria-modal="true"
                 style="position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:300;align-items:stretch;justify-content:center;padding:0;">
                <div class="glass-card" role="document"
                     style="width:100%;max-width:640px;margin:auto;height:100dvh;max-height:100dvh;border-radius:0;display:flex;flex-direction:column;overflow:hidden;">
                    <div class="modal-header sticky top-0" style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.08);">
                        <h2 style="font-size:17px;font-weight:800;margin:0;">Assign Jobs</h2>
                        <button class="modal-close-btn" onclick="closeAssignScreen()" aria-label="Close">&times;</button>
                    </div>
                    <div style="padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06);">
                        <input id="assignSearch" placeholder="Search customer, address, service…" oninput="renderAssignScreen()"
                               class="w-full bg-slate-700/60 text-white text-sm rounded-lg px-3 py-2">
                    </div>
                    <div id="assignScreenList" style="flex:1;overflow-y:auto;padding:10px 12px;"></div>
                </div>
            </div>

            <!-- Owner-only audit trail: "who did what, when". -->
            <section id="activityLogSection" class="hidden mb-5 mt-6">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="section-title">Activity Log</h2>
                    <button type="button" onclick="loadActivityLog()" class="text-primary text-xs font-semibold">
                        <i class="fas fa-rotate-right mr-1"></i>Refresh
                    </button>
                </div>
                <div id="activityLogList" class="space-y-1"></div>
                <p id="activityLogEmpty" class="hidden text-gray-500 text-sm text-center py-4">No activity yet.</p>
            </section>
        </div>
    </main>

    <!-- User create/edit modal -->
    <div id="userModal" class="modal" hidden role="dialog" aria-modal="true"
         style="position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:flex-end;justify-content:center;">
        <div class="modal-content bg-slate-800 rounded-t-2xl w-full overflow-y-auto"
             style="max-height: calc(100dvh - 40px); padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));">
            <div class="modal-header sticky top-0 bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center" style="z-index:10;">
                <h2 id="userModalTitle" class="text-lg font-bold">User</h2>
                <button class="modal-close-btn" onclick="closeModal('userModal')" aria-label="Close">&times;</button>
            </div>
            <div id="userModalBody" class="p-4 space-y-3"></div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-bar-inner">
            <a href="index.html" class="tab-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="jobs.html" class="tab-item"><i class="fas fa-briefcase"></i><span>Jobs</span></a>
            <a href="calendar.html" class="tab-item"><i class="fas fa-calendar-alt"></i><span>Calendar</span></a>
            <a href="customer-tracker.html" class="tab-item"><i class="fas fa-users"></i><span>Customers</span></a>
            <a href="more.html" class="tab-item"><i class="fas fa-ellipsis-h"></i><span>More</span></a>
        </div>
    </nav>

    <script>
        // --------------------------------------------------------------
        // Manager Panel
        //
        // Access matrix:
        //   Owner   -> full list of Managers + all Workers; can create,
        //              edit, deactivate/reactivate, delete, reassign, and
        //              grow the shared equipment list.
        //   Manager -> only assigned Workers; can edit non-privileged
        //              fields (contact/employment/certs/equipment) and
        //              deactivate/reactivate their own workers, plus
        //              assign jobs. Cannot create/delete users, change
        //              role/permissions/assignedManager, or add new
        //              shared equipment options.
        //   Worker  -> redirected away with a warning.
        //
        // User creation uses a secondary Firebase app instance so
        // createUserWithEmailAndPassword does NOT sign the Owner out.
        // There is no password-reset flow: a worker/manager's login uses a
        // bare username (not a real email), so Firebase's email-based reset
        // link can't reach them. If they forget their password, the only
        // option today is deleting + recreating the account.
        // --------------------------------------------------------------

        const PERMISSION_KEYS = [
            ['canCreateCustomers', 'Create customers'],
            ['canEditOwnCustomers', 'Edit own customers'],
            ['canCreateJobs', 'Create jobs / leads'],
            ['canAttachJobToCustomer', 'Attach job to customer'],
            ['canEditOwnJobs', 'Edit own jobs'],
            ['canUseEstimateForm', 'Use Estimate form'],
            ['canSendEstimates', 'Send estimates'],
            ['canViewCalendar', 'View Calendar'],
            ['canViewMap', 'View Map']
        ];

        let myProfile = null;
        let managers = [];
        let workers = [];
        let secondaryApp = null;

        function getSecondaryApp() {
            if (secondaryApp) return secondaryApp;
            const cfg = window.CL_SECRETS && window.CL_SECRETS.firebase;
            secondaryApp = firebase.apps.find(a => a.name === 'clSecondary')
                || firebase.initializeApp(cfg, 'clSecondary');
            return secondaryApp;
        }

        function ensureAllowed(profile) {
            myProfile = profile;
            const banner = document.getElementById('roleBanner');
            if (!profile) {
                banner.textContent = 'Loading profile...';
                return false;
            }
            if (profile.role === 'owner') {
                banner.innerHTML = '<i class="fas fa-crown text-amber-400 mr-1"></i>Signed in as Owner. Full access.';
                document.getElementById('ownerActions').classList.remove('hidden');
                document.getElementById('userRoleFilterRow').classList.remove('hidden');
                document.getElementById('activityLogSection').classList.remove('hidden');
                return true;
            }
            if (profile.role === 'manager') {
                banner.innerHTML = '<i class="fas fa-user-tie text-secondary mr-1"></i>Signed in as Manager. Managing your team only.';
                document.getElementById('usersLabel').textContent = 'Your Team';
                return true;
            }
            banner.innerHTML = '<i class="fas fa-ban text-red-400 mr-1"></i>Workers cannot access the Manager Panel.';
            return false;
        }

        async function loadUsers() {
            const db = CL_FIREBASE.getFirestore();
            if (!db || !myProfile) return;

            let snap;
            if (myProfile.role === 'owner') {
                snap = await db.collection('users').get();
            } else {
                // Manager: only our own workers.
                snap = await db.collection('users')
                    .where('assignedManager', '==', CL_FIREBASE.getCurrentUser().uid)
                    .get();
            }

            managers = [];
            workers = [];
            snap.forEach(doc => {
                const u = Object.assign({ uid: doc.id }, doc.data());
                if (u.role === 'manager') managers.push(u);
                else if (u.role === 'worker') workers.push(u);
            });
            renderUserList();
        }

        // -- Unified, searchable/filterable user list -------------------

        let userRoleFilter = 'all';
        let userStatusFilter = 'all';

        function setUserRoleFilter(val) {
            userRoleFilter = val;
            document.querySelectorAll('#userRoleFilterRow [data-role-filter]').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-role-filter') === val);
            });
            renderUserList();
        }

        function setUserStatusFilter(val) {
            userStatusFilter = val;
            document.querySelectorAll('[data-status-filter]').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-status-filter') === val);
            });
            renderUserList();
        }

        // Certification expiry: red badge once expired, amber inside 30 days.
        function certBadge(u) {
            const certs = Array.isArray(u.certifications) ? u.certifications : [];
            if (!certs.length) return '';
            const now = Date.now();
            const soon = now + 30 * 24 * 60 * 60 * 1000;
            let worst = null; // 'expired' beats 'expiring'
            certs.forEach(c => {
                if (!c || !c.expirationDate) return;
                const t = new Date(c.expirationDate + 'T12:00:00').getTime();
                if (isNaN(t)) return;
                if (t < now) worst = 'expired';
                else if (t <= soon && worst !== 'expired') worst = 'expiring';
            });
            if (!worst) return '';
            return `<span class="cert-badge ${worst}">${worst === 'expired' ? 'Cert expired' : 'Cert expiring'}</span>`;
        }

        function renderUserList() {
            const search = (document.getElementById('userSearch').value || '').toLowerCase().trim();
            const all = [...managers, ...workers];
            const filtered = all.filter(u => {
                if (userRoleFilter !== 'all' && u.role !== userRoleFilter) return false;
                if (userStatusFilter === 'active' && u.active === false) return false;
                if (userStatusFilter === 'inactive' && u.active !== false) return false;
                if (!search) return true;
                return (u.displayName || '').toLowerCase().includes(search)
                    || (u.username || '').toLowerCase().includes(search)
                    || (u.phone || '').toLowerCase().includes(search)
                    || (u.contactEmail || '').toLowerCase().includes(search);
            });

            const container = document.getElementById('userList');
            document.getElementById('emptyState').classList.toggle('hidden', all.length !== 0);
            if (!filtered.length) {
                container.innerHTML = all.length
                    ? '<p class="text-gray-500 text-xs px-1">No users match your search/filters.</p>'
                    : '';
                return;
            }

            container.innerHTML = filtered.map(u => {
                const subtitle = u.role === 'worker'
                    ? `${u.workerType || 'assigned'} \u2022 ${managers.find(m => m.uid === u.assignedManager)?.displayName || 'Unassigned'}`
                    : 'Manager';
                const statusPill = u.active === false
                    ? '<span class="text-[10px] uppercase tracking-wide text-red-300 bg-red-900/30 px-2 py-0.5 rounded-full ml-2">Inactive</span>'
                    : '';
                const contactLine = u.phone ? `<p class="text-[11px] text-gray-500 mt-0.5"><i class="fas fa-phone mr-1"></i>${escapeHtml(u.phone)}</p>` : '';
                const canManageThis = myProfile.role === 'owner' || (myProfile.role === 'manager' && u.assignedManager === CL_FIREBASE.getCurrentUser().uid);
                const nextActive = u.active === false;
                return `
                    <div class="user-card glass-card rounded-xl p-3 ${u.role} ${u.active === false ? 'inactive' : ''}">
                        <div class="flex justify-between items-start gap-2">
                            <div class="flex-1 min-w-0">
                                <p class="font-semibold truncate">${escapeHtml(u.displayName || u.username || '(unnamed)')}${statusPill}${certBadge(u)}</p>
                                <p class="text-xs text-gray-400 truncate">${escapeHtml(u.username || '')}</p>
                                <p class="text-[11px] text-gray-500 mt-0.5">${escapeHtml(subtitle)}</p>
                                ${contactLine}
                            </div>
                            <div class="user-card-actions">
                                <button type="button" onclick="openEditUser('${u.uid}')">Edit</button>
                                ${canManageThis ? `<button type="button" onclick="toggleUserActive('${u.uid}', ${nextActive})">${nextActive ? 'Reactivate' : 'Deactivate'}</button>` : ''}
                                ${myProfile.role === 'owner' ? `<button type="button" class="danger" onclick="confirmDeleteUser('${u.uid}')"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // -- New user form ---------------------------------------------

        async function openNewUser(role) {
            if (myProfile.role !== 'owner') {
                showToast('Only Owner can create users', 'error');
                return;
            }
            await loadEquipmentList();
            document.getElementById('userModalTitle').textContent = role === 'manager' ? 'New Manager' : 'New Worker';
            document.getElementById('userModalBody').innerHTML = renderUserForm({
                mode: 'create',
                role: role
            });
            openModal('userModal');
        }

        async function openEditUser(uid) {
            const u = [...managers, ...workers].find(x => x.uid === uid);
            if (!u) return;
            await loadEquipmentList();
            document.getElementById('userModalTitle').textContent = u.displayName || 'Edit User';
            document.getElementById('userModalBody').innerHTML = renderUserForm({
                mode: 'edit',
                user: u
            });
            openModal('userModal');
        }

        function renderUserForm({ mode, role, user }) {
            const isCreate = mode === 'create';
            const u = user || { role, permissions: {}, active: true };
            const readOnlyFlags = myProfile.role !== 'owner';
            const canAssignManager = myProfile.role === 'owner' && u.role === 'worker';
            const isOwnerViewer = myProfile.role === 'owner';

            const mgrOpts = managers.map(m =>
                `<option value="${m.uid}" ${m.uid === u.assignedManager ? 'selected' : ''}>${m.displayName || m.username}</option>`
            ).join('');

            const permRows = PERMISSION_KEYS.map(([key, label]) => `
                <label class="perm-row text-sm">
                    <span>${label}</span>
                    <input type="checkbox" data-perm="${key}" ${u.permissions && u.permissions[key] ? 'checked' : ''} ${readOnlyFlags ? 'disabled' : ''}>
                </label>
            `).join('');

            const certs = Array.isArray(u.certifications) ? u.certifications : [];
            const certRows = certs.map(c => renderCertRow(c.name, c.expirationDate)).join('');

            const equipList = Array.isArray(equipmentListCache) ? equipmentListCache : [];
            const assignedEquip = Array.isArray(u.assignedEquipment) ? u.assignedEquipment : [];
            const equipRows = equipList.map(name => `
                <label class="equip-check-row">
                    <input type="checkbox" data-equip="${escapeHtml(name)}" ${assignedEquip.includes(name) ? 'checked' : ''} style="width:16px;height:16px;accent-color:#0ea5e9;">
                    <span>${escapeHtml(name)}</span>
                </label>
            `).join('') || '<p class="text-xs text-gray-500">No equipment added yet.</p>';

            return `
                <input type="hidden" id="userForm-mode" value="${mode}">
                <input type="hidden" id="userForm-uid" value="${u.uid || ''}">
                <input type="hidden" id="userForm-role" value="${u.role || role}">

                <div>
                    <label class="text-xs text-gray-400 block mb-1">Display Name *</label>
                    <input type="text" id="uf-displayName" value="${(u.displayName || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Username *</label>
                    <!-- Plain username. firebase-sync appends the synthetic
                         @clearline.invalid suffix only when talking to
                         Firebase Auth; the user doc stores the bare form. -->
                    <input type="text" id="uf-username" value="${(u.username || '').replace(/"/g,'&quot;')}" ${isCreate ? '' : 'disabled'} autocapitalize="none" autocorrect="off" spellcheck="false" class="w-full p-3 rounded-lg edit-field">
                    ${isCreate ? '<p class="text-[11px] text-gray-500 mt-1">No email required. just a short login handle (e.g. "john"). This is separate from their real contact info below.</p>' : ''}
                </div>
                ${isCreate ? `
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">Initial Password *</label>
                        <input type="text" id="uf-password" class="w-full p-3 rounded-lg edit-field" autocomplete="off">
                        <p class="text-[11px] text-gray-500 mt-1">Share with the user out-of-band. They can't reset it themselves.</p>
                    </div>
                ` : ''}
                ${u.role === 'worker' ? `
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Worker Type</label>
                            <select id="uf-workerType" class="w-full p-3 rounded-lg edit-field" ${readOnlyFlags ? 'disabled' : ''} ${isCreate ? 'onchange="applyWorkerTypePermDefaults()"' : ''}>
                                <option value="assigned" ${u.workerType === 'assigned' ? 'selected' : ''}>Assigned</option>
                                <option value="estimator" ${u.workerType === 'estimator' ? 'selected' : ''}>Estimator</option>
                                <option value="salesman" ${u.workerType === 'salesman' ? 'selected' : ''}>Salesman</option>
                            </select>
                            ${u.workerType === 'salesman' || isCreate ? '<p class="text-[11px] text-gray-500 mt-1">Salesman: creates customers &amp; leads only — no job/pricing access needed. Grant "Create customers" + "Create jobs" below.</p>' : ''}
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Assigned Manager</label>
                            <select id="uf-assignedManager" class="w-full p-3 rounded-lg edit-field" ${canAssignManager ? '' : 'disabled'}>
                                <option value="">None</option>
                                ${mgrOpts}
                            </select>
                        </div>
                    </div>
                ` : ''}

                <details class="form-section">
                    <summary>Contact</summary>
                    <div class="section-body grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Phone</label>
                            <input type="tel" id="uf-phone" value="${(u.phone || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">Email</label>
                            <input type="email" id="uf-contactEmail" value="${(u.contactEmail || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                        </div>
                    </div>
                </details>

                <details class="form-section">
                    <summary>Employment</summary>
                    <div class="section-body space-y-2">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-xs text-gray-400 block mb-1">Hire Date</label>
                                <input type="date" id="uf-hireDate" value="${u.hireDate || ''}" class="w-full p-3 rounded-lg edit-field">
                            </div>
                            <div>
                                <label class="text-xs text-gray-400 block mb-1">Employee ID</label>
                                <input type="text" id="uf-employeeId" value="${(u.employeeId || '').replace(/"/g,'&quot;')}" class="w-full p-3 rounded-lg edit-field">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-xs text-gray-400 block mb-1">Pay Type</label>
                                <select id="uf-payType" class="w-full p-3 rounded-lg edit-field">
                                    <option value="" ${!u.payType ? 'selected' : ''}>—</option>
                                    <option value="hourly" ${u.payType === 'hourly' ? 'selected' : ''}>Hourly</option>
                                    <option value="salary" ${u.payType === 'salary' ? 'selected' : ''}>Salary</option>
                                    <option value="per-job" ${u.payType === 'per-job' ? 'selected' : ''}>Per Job</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs text-gray-400 block mb-1">Pay Rate ($)</label>
                                <input type="number" step="0.01" id="uf-payRate" value="${u.payRate || ''}" class="w-full p-3 rounded-lg edit-field">
                            </div>
                        </div>
                    </div>
                </details>

                <details class="form-section">
                    <summary>Certifications</summary>
                    <div class="section-body">
                        <div id="certRows">${certRows}</div>
                        <button type="button" onclick="addCertRow()" class="btn-secondary btn-sm" style="width:auto"><i class="fas fa-plus mr-1"></i>Add certification</button>
                    </div>
                </details>

                <details class="form-section">
                    <summary>Assigned Equipment</summary>
                    <div class="section-body">
                        <div id="equipCheckList">${equipRows}</div>
                        ${isOwnerViewer ? `
                            <div class="equip-add-row pt-1">
                                <input type="text" id="uf-newEquipment" placeholder="e.g. Truck 2, Surface Cleaner" class="w-full">
                                <button type="button" onclick="addEquipmentOption()" class="btn-secondary btn-sm">Add</button>
                            </div>
                        ` : ''}
                    </div>
                </details>

                <details class="form-section">
                    <summary>Permissions${readOnlyFlags ? ' (Owner-only to edit)' : ''}</summary>
                    <div class="section-body">${permRows}</div>
                </details>

                <div class="flex gap-2 pt-2">
                    <button onclick="closeModal('userModal')" class="btn-secondary" style="width:auto;flex:1">Cancel</button>
                    <button onclick="submitUserForm()" class="btn-primary" style="flex:1;width:auto">
                        ${isCreate ? 'Create User' : 'Save Changes'}
                    </button>
                </div>

            `;
        }

        // -- Certification repeatable rows -------------------------------

        function renderCertRow(name, expirationDate) {
            return `
                <div class="cert-row">
                    <input type="text" class="cert-name" placeholder="Certification name" value="${(name || '').replace(/"/g,'&quot;')}">
                    <input type="date" class="cert-expiry" value="${expirationDate || ''}" style="max-width:150px;">
                    <button type="button" onclick="this.closest('.cert-row').remove()" class="btn-secondary btn-sm"><i class="fas fa-times"></i></button>
                </div>
            `;
        }

        function addCertRow() {
            document.getElementById('certRows').insertAdjacentHTML('beforeend', renderCertRow('', ''));
        }

        function collectCertifications() {
            return [...document.querySelectorAll('#certRows .cert-row')].map(row => ({
                name: row.querySelector('.cert-name').value.trim(),
                expirationDate: row.querySelector('.cert-expiry').value || ''
            })).filter(c => c.name);
        }

        // -- Equipment picker (shared, growable list in settings/global) --

        let equipmentListCache = [];

        async function loadEquipmentList() {
            const settings = await CL_FIREBASE.getGlobalSettings();
            equipmentListCache = (settings && Array.isArray(settings.equipmentList)) ? settings.equipmentList : [];
        }

        async function addEquipmentOption() {
            const input = document.getElementById('uf-newEquipment');
            const name = (input.value || '').trim();
            if (!name) return;
            if (equipmentListCache.includes(name)) {
                showToast('Already in the list — just check it below', 'error');
                return;
            }
            const next = [...equipmentListCache, name];
            const res = await CL_FIREBASE.updateGlobalSettings({ equipmentList: next });
            if (!res.ok) {
                showToast('Could not save new equipment: ' + (res.code || 'unknown'), 'error');
                return;
            }
            equipmentListCache = next;
            input.value = '';
            const list = document.getElementById('equipCheckList');
            list.insertAdjacentHTML('beforeend', `
                <label class="equip-check-row">
                    <input type="checkbox" data-equip="${escapeHtml(name)}" checked style="width:16px;height:16px;accent-color:#0ea5e9;">
                    <span>${escapeHtml(name)}</span>
                </label>
            `);
            const emptyMsg = list.querySelector('p');
            if (emptyMsg) emptyMsg.remove();
        }

        function collectAssignedEquipment() {
            return [...document.querySelectorAll('#equipCheckList [data-equip]:checked')].map(cb => cb.getAttribute('data-equip'));
        }

        // Convenience default when creating a new Salesman: they need to
        // create customers/leads but nothing else, so pre-check just those
        // two permission boxes instead of making the Owner hunt for them.
        // Only fires on create — never silently changes an existing worker's
        // permissions just because their type field is touched.
        function applyWorkerTypePermDefaults() {
            const wt = document.getElementById('uf-workerType');
            if (!wt || wt.value !== 'salesman') return;
            ['canCreateCustomers', 'canCreateJobs'].forEach(key => {
                const cb = document.querySelector(`[data-perm="${key}"]`);
                if (cb) cb.checked = true;
            });
        }

        async function submitUserForm() {
            const db = CL_FIREBASE.getFirestore();
            const mode = document.getElementById('userForm-mode').value;
            const uid = document.getElementById('userForm-uid').value;
            const role = document.getElementById('userForm-role').value;
            const displayName = document.getElementById('uf-displayName').value.trim();
            const username = document.getElementById('uf-username').value.trim();
            if (!displayName || !username) {
                showToast('Name and username are required', 'error'); return;
            }

            // Fields any editor (Owner, or a Manager on their own worker) may
            // change — none of these are locked by the Firestore update rules.
            const commonFields = {
                displayName,
                phone: document.getElementById('uf-phone').value.trim(),
                contactEmail: document.getElementById('uf-contactEmail').value.trim(),
                hireDate: document.getElementById('uf-hireDate').value || '',
                employeeId: document.getElementById('uf-employeeId').value.trim(),
                payType: document.getElementById('uf-payType').value || '',
                payRate: document.getElementById('uf-payRate').value || '',
                certifications: collectCertifications(),
                assignedEquipment: collectAssignedEquipment()
            };
            if (role === 'worker') {
                const wt = document.getElementById('uf-workerType');
                if (wt) commonFields.workerType = wt.value;
            }

            // Privileged fields: role/permissions/assignedManager can only be
            // set by the Owner (rules lock these for self/Manager updates).
            const perms = {};
            document.querySelectorAll('[data-perm]').forEach(inp => {
                perms[inp.getAttribute('data-perm')] = !!inp.checked;
            });
            const ownerOnlyFields = { role, username, permissions: perms };
            if (role === 'worker') {
                const am = document.getElementById('uf-assignedManager');
                if (am) ownerOnlyFields.assignedManager = am.value || null;
            }

            try {
                if (mode === 'create') {
                    const password = document.getElementById('uf-password').value;
                    if (!password || password.length < 6) {
                        showToast('Password must be at least 6 characters', 'error'); return;
                    }
                    if (/\s/.test(username)) {
                        showToast('Username cannot contain spaces', 'error'); return;
                    }
                    // Check username isn't already taken in Firestore
                    const existingSnap = await db.collection('users')
                        .where('username', '==', username).limit(1).get();
                    if (!existingSnap.empty) {
                        showToast('Username "' + username + '" is already taken', 'error'); return;
                    }
                    // Firebase Auth still requires an email-shaped value.
                    // Synthesize one and keep the bare username on the user
                    // doc for the UI to display.
                    const authEmail = CL_FIREBASE.toAuthEmail(username);
                    const sec = getSecondaryApp();
                    let cred;
                    try {
                        cred = await sec.auth().createUserWithEmailAndPassword(authEmail, password);
                    } catch (authErr) {
                        if (authErr.code === 'auth/email-already-in-use') {
                            showToast('Username "' + username + '" is already registered', 'error');
                        } else {
                            showToast('Error: ' + (authErr.code || authErr.message), 'error');
                        }
                        return;
                    }
                    const newUid = cred.user.uid;
                    await db.collection('users').doc(newUid).set({
                        ...commonFields,
                        ...ownerOnlyFields,
                        active: true,
                        authEmail,
                        createdBy: CL_FIREBASE.getCurrentUser().uid,
                        createdAt: new Date().toISOString(),
                        lastUpdated: new Date().toISOString()
                    });
                    await sec.auth().signOut();
                    CL_FIREBASE.logActivity('user.created', { entityType: 'user', entityId: newUid, entityLabel: displayName });
                    showToast('User created');
                } else {
                    const patch = Object.assign({ lastUpdated: new Date().toISOString() }, commonFields);
                    if (myProfile.role === 'owner') {
                        Object.assign(patch, ownerOnlyFields);
                    }
                    await db.collection('users').doc(uid).set(patch, { merge: true });
                    CL_FIREBASE.logActivity('user.updated', { entityType: 'user', entityId: uid, entityLabel: displayName });
                    showToast('Saved');
                }
                closeModal('userModal');
                await loadUsers();
            } catch (err) {
                console.error(err);
                const code = err.code || '';
                showToast('Error: ' + (code || err.message || 'unknown'), 'error');
            }
        }

        // -- Deactivate / Reactivate (one-tap row action) ----------------

        async function toggleUserActive(uid, nextActive) {
            const db = CL_FIREBASE.getFirestore();
            const u = [...managers, ...workers].find(x => x.uid === uid);
            if (!u) return;
            try {
                await db.collection('users').doc(uid).set({
                    active: nextActive,
                    lastUpdated: new Date().toISOString()
                }, { merge: true });
                u.active = nextActive;
                CL_FIREBASE.logActivity(nextActive ? 'user.reactivated' : 'user.deactivated', {
                    entityType: 'user', entityId: uid, entityLabel: u.displayName || u.username
                });
                renderUserList();
                showToast(nextActive ? 'User reactivated' : 'User deactivated');
            } catch (err) {
                console.error(err);
                showToast('Error: ' + (err.code || err.message || 'unknown'), 'error');
            }
        }

        // -- Delete user (Owner-only) -------------------------------------
        // Deletes the Firestore profile doc only — there's no backend/Admin
        // SDK to delete the underlying Firebase Auth account from a static
        // client app. That's fine: _loadOrSeedProfile() already signs out
        // and rejects any authenticated user with no matching profile doc,
        // so removing the doc fully revokes their access to the app.
        // Jobs/customers they created or were assigned to are left as-is
        // (same as deactivation today, just permanent) — no cascade delete.
        function confirmDeleteUser(uid) {
            const u = [...managers, ...workers].find(x => x.uid === uid);
            if (!u) return;
            if (!confirm(`Delete ${u.displayName || u.username}? This removes their access immediately and can't be undone. Jobs/customers they created or were assigned to keep their history.`)) return;
            deleteUser(uid, u);
        }

        async function deleteUser(uid, u) {
            const db = CL_FIREBASE.getFirestore();
            try {
                await db.collection('users').doc(uid).delete();
                CL_FIREBASE.logActivity('user.deleted', { entityType: 'user', entityId: uid, entityLabel: u.displayName || u.username });
                showToast('User deleted');
                await loadUsers();
            } catch (err) {
                console.error(err);
                showToast('Error: ' + (err.code || err.message || 'unknown'), 'error');
            }
        }


        // -- Wire up on profile ready ----------------------------------

        function start(profile) {
            if (!ensureAllowed(profile)) return;
            const tasks = [
                loadUsers().catch(err => { console.error(err); showToast('Could not load users: ' + (err.code || err.message), 'error'); }),
                loadAssignableJobs().catch(err => { console.error(err); })
            ];
            if (profile.role === 'owner') {
                tasks.push(loadActivityLog().catch(err => console.error(err)));
            }
            Promise.all(tasks);
        }

        // -- Activity Log (Owner-only) ------------------------------------

        const ACTION_LABELS = {
            'job.status_changed': 'updated job status',
            'job.deleted': 'deleted a job',
            'job.updated': 'edited a job',
            'estimate.finalized': 'finalized an estimate',
            'invoice.finalized': 'finalized an invoice',
            'user.created': 'created a user',
            'user.updated': 'updated a user',
            'user.deactivated': 'deactivated a user',
            'user.reactivated': 'reactivated a user',
            'user.deleted': 'deleted a user'
        };

        async function loadActivityLog() {
            const db = CL_FIREBASE.getFirestore();
            if (!db) return;
            const snap = await db.collection('activityLog').orderBy('createdAt', 'desc').limit(150).get();
            renderActivityLog(snap.docs.map(d => d.data()));
        }

        function renderActivityLog(entries) {
            const list = document.getElementById('activityLogList');
            const empty = document.getElementById('activityLogEmpty');
            if (!entries.length) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            list.innerHTML = entries.map(e => {
                const label = ACTION_LABELS[e.action] || e.action || 'did something';
                const entityLabel = e.entityLabel ? ` — ${escapeHtml(e.entityLabel)}` : '';
                const extra = e.message ? ` (${escapeHtml(e.message)})` : (e.reason ? ` (${escapeHtml(e.reason)})` : '');
                const when = e.createdAt ? new Date(e.createdAt).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
                return `
                    <div class="activity-row">
                        <span class="activity-msg"><strong>${escapeHtml(e.actorName || 'Someone')}</strong> ${label}${entityLabel}${extra}</span>
                        <span class="activity-meta">${when}</span>
                    </div>
                `;
            }).join('');
        }

        // -- Assign Jobs section ---------------------------------------
        let assignableJobs = [];

        async function loadAssignableJobs() {
            const db = CL_FIREBASE.getFirestore();
            const uid = CL_FIREBASE.getCurrentUser().uid;
            let docs;
            // All roles use the same provable query: accessUids contains me.
            const snap = await db.collection('jobs').where('accessUids', 'array-contains', uid).get();
            docs = snap.docs.map(d => d.data());
            // Hide completed jobs. they don't need reassignment.
            assignableJobs = docs.filter(j => j.status !== 'completed')
                .sort((a, b) => (b.jobDate || '').localeCompare(a.jobDate || ''));
            // Screen renders on open (openAssignScreen), not inline anymore.
        }

        function openAssignScreen() { document.getElementById('assignScreen').hidden = false; renderAssignScreen(); }
        function closeAssignScreen() { document.getElementById('assignScreen').hidden = true; }

        // which job's picker is open
        let assignOpenJob = null;

        function assignTargets() {
            const myUid = CL_FIREBASE.getCurrentUser().uid;
            const targetWorkers = myProfile.role === 'owner'
                ? workers.filter(w => w.active !== false)
                : workers.filter(w => w.active !== false && w.assignedManager === myUid);
            const targetManagers = myProfile.role === 'owner'
                ? managers.filter(m => m.active !== false)
                : [];
            return { targetWorkers, targetManagers };
        }

        function renderAssignScreen() {
            const search = (document.getElementById('assignSearch').value || '').toLowerCase().trim();
            const filtered = assignableJobs.filter(j => {
                if (!search) return true;
                return (j.customerName || '').toLowerCase().includes(search)
                    || (j.address || '').toLowerCase().includes(search)
                    || (j.serviceType || '').toLowerCase().includes(search);
            });
            const list = document.getElementById('assignScreenList');
            if (!filtered.length) {
                list.innerHTML = '<p class="text-gray-500 text-sm text-center py-6">No jobs available to assign.</p>';
                return;
            }
            const { targetWorkers, targetManagers } = assignTargets();
            const mgrOpts = ['<option value="">Unassigned</option>']
                .concat(targetManagers.map(m =>
                    `<option value="${m.uid}">${escapeHtml(m.displayName || m.username || m.uid)}</option>`)).join('');

            list.innerHTML = filtered.map(j => {
                const open = assignOpenJob === j.id;
                const assignedWorkerIds = Array.isArray(j.assignedWorkers) && j.assignedWorkers.length
                    ? j.assignedWorkers : (j.assignedTo ? [j.assignedTo] : []);
                const dateLabel = j.jobDate
                    ? new Date(j.jobDate + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                    : 'No date';
                const assignedNames = assignedWorkerIds
                    .map(id => (workers.find(w => w.uid === id) || {}).displayName || (workers.find(w => w.uid === id) || {}).username || id)
                    .filter(Boolean);
                const crewLine = assignedNames.length
                    ? `<span class="text-[11px] text-emerald-300">→ ${escapeHtml(assignedNames.join(', '))}</span>`
                    : '<span class="text-[11px] text-gray-500">Unassigned</span>';

                const picker = open ? `
                    <div class="mt-3 pt-3" style="border-top:1px solid rgba(255,255,255,0.08);">
                        ${targetManagers.length ? `
                            <label class="text-[11px] text-gray-400 block mb-1">Manager</label>
                            <select class="assign-manager-select w-full bg-slate-700/60 text-white text-sm rounded-lg px-2 py-1.5 mb-3" data-job-id="${j.id}">
                                ${mgrOpts.replace(`value="${j.assignedManager || ''}"`, `value="${j.assignedManager || ''}" selected`)}
                            </select>
                        ` : ''}
                        <label class="text-[11px] text-gray-400 block mb-1">Workers (crew)</label>
                        ${targetWorkers.length ? `
                            <div class="assign-worker-checks" data-job-id="${j.id}" style="max-height:160px;overflow-y:auto;background:rgba(15,23,42,0.5);border-radius:8px;padding:6px 10px;">
                                ${targetWorkers.map(w => `
                                    <label style="display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:13px;">
                                        <input type="checkbox" data-assign-worker="${w.uid}" ${assignedWorkerIds.includes(w.uid) ? 'checked' : ''} style="width:16px;height:16px;accent-color:#0ea5e9;">
                                        <span>${escapeHtml(w.displayName || w.username || w.uid)}</span>
                                    </label>
                                `).join('')}
                            </div>
                        ` : '<p class="text-gray-500 text-xs">No workers available.</p>'}
                        <button class="btn-primary btn-sm mt-3" style="width:auto;" onclick="saveAssignJob('${j.id}', this)">Save assignment</button>
                    </div>
                ` : '';

                return `
                    <div class="glass-card rounded-xl p-3 mb-2">
                        <button type="button" onclick="toggleAssignJob('${j.id}')" class="w-full text-left" style="background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;">
                            <div class="min-w-0">
                                <p class="font-semibold truncate" style="margin:0;">${escapeHtml(j.customerName || 'Job')}</p>
                                <p class="text-[11px] text-gray-500">${dateLabel} • ${escapeHtml(j.serviceType || 'Service')}${j.address ? ' • ' + escapeHtml(j.address) : ''}</p>
                                <p style="margin:2px 0 0;">${crewLine}</p>
                            </div>
                            <i class="fas ${open ? 'fa-chevron-up' : 'fa-chevron-down'} text-gray-400" style="flex-shrink:0;"></i>
                        </button>
                        ${picker}
                    </div>`;
            }).join('');
        }

        function toggleAssignJob(id) {
            assignOpenJob = (assignOpenJob === id) ? null : id;
            renderAssignScreen();
        }

        async function saveAssignJob(jobId, btn) {
            const db = CL_FIREBASE.getFirestore();
            const workerBox = document.querySelector(`.assign-worker-checks[data-job-id="${jobId}"]`);
            if (!workerBox) return;
            const assignedWorkers = [...workerBox.querySelectorAll('[data-assign-worker]:checked')]
                .map(cb => cb.getAttribute('data-assign-worker'));
            const mgrSelect = document.querySelector(`select.assign-manager-select[data-job-id="${jobId}"]`);
            const assignedManager = mgrSelect
                ? (mgrSelect.value || null)
                : (myProfile.role === 'manager' ? CL_FIREBASE.getCurrentUser().uid : null);

            const orig = btn.textContent;
            btn.disabled = true; btn.textContent = 'Saving…';
            try {
                const existing = assignableJobs.find(x => x.id === jobId) || {};
                await db.collection('jobs').doc(jobId).set({
                    assignedWorkers,
                    assignedManager,
                    assignedTo: null,
                    lastUpdated: new Date().toISOString(),
                    // Recompute the reader set so the Firestore read rule
                    // (uid() in accessUids) stays provable. Merge the
                    // existing assigned fields so we don't drop readers who
                    // were already granted access.
                    accessUids: window.buildAccessUids(
                        { assignedWorkers, assignedManager, assignedTo: null, createdBy: existing.createdBy },
                        existing
                    )
                }, { merge: true });
                const j = assignableJobs.find(x => x.id === jobId);
                if (j) { j.assignedWorkers = assignedWorkers; j.assignedManager = assignedManager; j.assignedTo = null; }
                CL_FIREBASE.logActivity('job.updated', {
                    entityType: 'job', entityId: jobId, entityLabel: j && j.customerName,
                    message: `crew set to ${assignedWorkers.length} worker(s)`
                });
                btn.textContent = 'Saved ✓';
                setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1200);
            } catch (err) {
                console.error(err);
                btn.textContent = orig; btn.disabled = false;
                showToast('Assign failed: ' + (err.code || err.message), 'error');
            }
        }

        // If firebase-sync already loaded profile before this script ran,
        // the event has already fired. Poll a few times as a safety net.
        let started = false;
        window.addEventListener('cl-profile-updated', (e) => {
            if (started) return; started = true;
            start(e.detail && e.detail.profile);
        });
        document.addEventListener('DOMContentLoaded', () => {
            setActiveNav();
            setTimeout(() => {
                if (started) return;
                const p = CL_FIREBASE.getProfile && CL_FIREBASE.getProfile();
                if (p) { started = true; start(p); }
            }, 800);
        });
    </script>
</body>
</html>
