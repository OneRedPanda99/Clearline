<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1c1f">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Money - Clearline</title>
    <script src="config.js"></script>
    <script src="utils.js?v=2"></script>
    <script src="data-migration.js"></script>
    <script src="firebase-sync.js?v=5"></script>
    <link rel="stylesheet" href="app.css?v=6">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --row-h: 60px; }
        .money-row {
            display:flex; align-items:center; gap:var(--md-space-3);
            min-height: var(--row-h);
            padding: var(--md-space-3) var(--md-space-2);
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            text-decoration:none; color: inherit;
        }
        .money-row:last-child { border-bottom: none; }
        .money-dot { width: 10px; height: 10px; border-radius: 999px; background: rgba(148,163,184,0.45); flex-shrink:0; }
        .money-amt { margin-left:auto; font-weight: 800; color: #e2e8f0; white-space:nowrap; }
        .money-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .pill { font-size: 10px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 8px; border-radius: 999px; }
        .pill.tax { background: rgba(251,191,36,0.14); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
        .pill.pay { background: color-mix(in srgb, var(--md-sys-color-secondary) 18%, transparent); color: var(--md-sys-color-secondary); border: 1px solid color-mix(in srgb, var(--md-sys-color-secondary) 30%, transparent); }
        .pill.exp { background: rgba(52,211,153,0.14); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
        .pill.auto { background: rgba(96,165,250,0.16); color: #60a5fa; border: 1px solid rgba(96,165,250,0.28); }
        .pill.manual { background: rgba(148,163,184,0.16); color: #94a3b8; border: 1px solid rgba(148,163,184,0.28); }
        .pill.review { background: rgba(248,113,113,0.16); color: #f87171; border: 1px solid rgba(248,113,113,0.28); }
        .form-grid { display:grid; gap:10px; }
        .form-grid label { font-size: 12px; color:#94a3b8; display:block; margin-bottom:4px; }
        .form-grid input, .form-grid select, .form-grid textarea {
            width:100%; padding: 12px; border-radius: 12px;
        }
        .money-pie-grid { display: grid; gap: 12px; }
        @media (min-width: 720px) { .money-pie-grid { grid-template-columns: repeat(3, 1fr); } }
        .money-pie {
            width: 148px; height: 148px; border-radius: 50%; margin: 8px auto 14px;
            border: 6px solid var(--md-sys-color-surface-container-low, #1e2126);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
        }
        .money-pie-legend { display: grid; gap: 8px; }
        .money-pie-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .money-pie-swatch { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
        .money-pie-legend-label { color: #e2e8f0; font-weight: 650; }
        .money-pie-legend-val { margin-left: auto; color: #94a3b8; font-weight: 600; }
        /* Sort / filter bar */
        .toolbar {
            display:flex; align-items:center; gap:8px; flex-wrap:wrap;
            margin-bottom: 10px;
        }
        .toolbar .spacer { flex:1 1 auto; }
        .seg {
            display:inline-flex; background: rgba(15,23,42,0.5);
            border:1px solid var(--md-sys-color-outline-variant); border-radius: 999px; padding:2px;
        }
        .seg button {
            border:none; background:transparent; color:#94a3b8; font-size:12px; font-weight:700;
            padding:6px 10px; border-radius:999px; cursor:pointer;
        }
        .seg button.active { background: var(--md-sys-color-primary); color:#0b0d10; }
        .sort-btn {
            display:inline-flex; align-items:center; gap:5px;
            background: rgba(15,23,42,0.5); border:1px solid var(--md-sys-color-outline-variant);
            color:#cbd5e1; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer;
        }
        .sort-btn .arrow { font-size:10px; color:#60a5fa; }
        .emp-card {
            display:flex; align-items:center; gap:12px; padding:12px 14px;
            border-bottom:1px solid var(--md-sys-color-outline-variant);
        }
        .emp-card:last-child { border-bottom:none; }
        .emp-avatar {
            width:42px; height:42px; border-radius:50%; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            background: color-mix(in srgb, var(--md-sys-color-secondary) 22%, transparent);
            color: var(--md-sys-color-secondary); font-weight:800; font-size:15px;
        }
        .emp-meta { font-size:12px; color:#94a3b8; }
        .badge-soft { font-size:10px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; padding:3px 7px; border-radius:999px; background:rgba(148,163,184,0.16); color:#94a3b8; }
        .badge-soft.mgr { background: color-mix(in srgb, var(--md-sys-color-secondary) 18%, transparent); color: var(--md-sys-color-secondary); }
        .subhead { display:flex; align-items:center; justify-content:space-between; margin:18px 0 8px; }
        .subhead h3 { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#94a3b8; margin:0; }
        /* Fullscreen receipt viewer */
        .lightbox {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            background: rgba(8,10,12,0.96);
            padding: 24px;
            cursor: zoom-out;
            -webkit-tap-highlight-color: transparent;
        }
        .lightbox[hidden] { display: none; }
        .lightbox img {
            max-width: 100%; max-height: 100%;
            width: auto; height: auto;
            object-fit: contain;
            border-radius: 14px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
        }
        .lightbox .lb-close {
            position: fixed; top: 16px; right: 16px;
            width: 44px; height: 44px; border-radius: 999px;
            border: none; background: rgba(255,255,255,0.12);
            color: #fff; font-size: 22px; line-height: 1;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 1001;
        }
        .lightbox .lb-hint {
            position: fixed; bottom: 18px; left: 0; right: 0; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 12px; pointer-events: none;
        }
        @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-header-inner app-header-inner--split">
            <div class="app-header-wing">
                <a href="more.html" class="header-tool-btn" aria-label="Back"><i class="fas fa-chevron-left"></i></a>
            </div>
            <div class="app-header-center"><h1>Money</h1></div>
            <div class="app-header-wing app-header-wing--end">
                <button id="addBtn" class="header-action-btn" aria-label="Add"><i class="fas fa-plus"></i></button>
            </div>
        </div>
    </header>

    <main class="app-content">
        <div class="content-wrapper">
            <div id="ownerOnlyBanner" class="glass-card rounded-xl p-3 text-sm text-gray-300 hidden" style="margin-bottom: 12px;">
                <i class="fas fa-lock mr-1" style="color:#fbbf24;"></i> Money is owner-only.
            </div>

            <div class="page-tabs page-tabs--pills">
                <button type="button" class="page-tab active" id="tabExpenses" onclick="setTab('expenses')">Expenses</button>
                <button type="button" class="page-tab" id="tabPayroll" onclick="setTab('payroll')">Payroll</button>
                <button type="button" class="page-tab" id="tabRevenue" onclick="setTab('revenue')">Revenue</button>
            </div>

            <div id="statsRow" class="mb-3"></div>
            <div id="moneyBody"></div>
        </div>
    </main>

    <div id="moneyModal" class="modal" hidden role="dialog" aria-modal="true">
        <div class="modal-content glass-card" role="document" style="width:100%;max-width:500px;max-height:90vh;overflow-y:auto;">
            <div class="modal-header" style="padding: 16px; display:flex; align-items:center; justify-content:space-between;">
                <h2 id="moneyModalTitle" style="font-size:18px;font-weight:800;margin:0;">Add</h2>
                <button class="modal-close-btn" onclick="closeModal('moneyModal')" aria-label="Close">&times;</button>
            </div>
            <div style="padding: 16px;">
                <div id="moneyModalBody"></div>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox" hidden onclick="closeLightbox()">
        <button class="lb-close" type="button" onclick="event.stopPropagation(); closeLightbox()" aria-label="Close">&times;</button>
        <img id="lightboxImg" src="" alt="Receipt">
        <div class="lb-hint">Tap anywhere to close</div>
    </div>

    <script>
        let myProfile = null;
        let currentTab = 'expenses';
        let moneyPeriod = 'month'; // week | month | year

        // ---- unified expenses view state ----
        let expSortKey = 'date';     // date | amount | vendor | source
        let expSortDir = 'desc';    // asc | desc
        let expFilter = 'all';      // all | manual | auto
        let expHideDupes = true;   // hide manual entries that duplicate a receipt
        let csvCache = null;        // parsed receipt rows (auto), or null
        let csvError = false;

        const TAX_CATS = [
            { id: 'advertising', label: 'Advertising' },
            { id: 'car_truck', label: 'Car and truck (gas, maintenance)' },
            { id: 'chemicals_supplies', label: 'Chemicals & supplies' },
            { id: 'contract_labor', label: 'Contract labor' },
            { id: 'depreciation', label: 'Depreciation' },
            { id: 'insurance', label: 'Insurance' },
            { id: 'interest', label: 'Interest' },
            { id: 'legal_professional', label: 'Legal & professional' },
            { id: 'office', label: 'Office expense' },
            { id: 'rent', label: 'Rent/lease' },
            { id: 'repairs', label: 'Repairs & maintenance' },
            { id: 'meals', label: 'Meals (business)' },
            { id: 'taxes_licenses', label: 'Taxes & licenses' },
            { id: 'travel', label: 'Travel' },
            { id: 'utilities', label: 'Utilities' },
            { id: 'wages', label: 'Wages (payroll)' },
            { id: 'other', label: 'Other' }
        ];
        const catLabel = (id) => (TAX_CATS.find(c => c.id === id)?.label || 'Other');

        function fmtMoney(n) {
            const v = Number(n || 0);
            if (!isFinite(v)) return '$0';
            const neg = v < 0;
            return (neg ? '-$' : '$') + Math.abs(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function esc(v) {
            return String(v ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function parseAmt(v) {
            const n = parseFloat(String(v || '').replace(/[^0-9.\-]/g, ''));
            return isNaN(n) ? 0 : n;
        }

        function ymdNow() {
            return (window.localYmd ? localYmd() : new Date().toISOString().split('T')[0]);
        }
        function monthKey(ymd) { return String(ymd || '').slice(0, 7); }

        function setTab(tab) {
            currentTab = tab;
            ['expenses','payroll','revenue'].forEach(t => {
                const el = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
                if (el) el.classList.toggle('active', t === tab);
            });
            render();
        }

        function setMoneyPeriod(period) { moneyPeriod = period; render(); }
        window.setMoneyPeriod = setMoneyPeriod;

        function ensureOwner() { return !!myProfile && myProfile.role === 'owner'; }

        function showOwnerOnlyUI() {
            const banner = document.getElementById('ownerOnlyBanner');
            const addBtn = document.getElementById('addBtn');
            if (!ensureOwner()) {
                banner.classList.remove('hidden');
                addBtn.classList.add('hidden');
            } else {
                banner.classList.add('hidden');
                addBtn.classList.toggle('hidden', currentTab === 'revenue');
            }
        }

        function openAdd() {
            if (!ensureOwner()) { showToast('Owner only', 'error'); return; }
            if (currentTab === 'payroll') openPayrollModal();
            else openExpenseModal();
        }

        // ------------------------------------------------------------------
        //  EXPENSES — unified list (manual + automatic from receipt pipeline)
        // ------------------------------------------------------------------
        function openExpenseModal(expense) {
            const isEdit = !!expense;
            document.getElementById('moneyModalTitle').textContent = isEdit ? 'Edit expense' : 'Add expense';
            const opts = TAX_CATS.map(c => `<option value="${c.id}" ${expense && expense.taxCategory === c.id ? 'selected' : ''}>${c.label}</option>`).join('');
            document.getElementById('moneyModalBody').innerHTML = `
                <div class="form-grid">
                    <div><label>Date</label><input id="expDate" type="date" value="${(expense && expense.date) || ymdNow()}"></div>
                    <div><label>Amount</label><input id="expAmount" inputmode="decimal" placeholder="0.00" value="${expense ? String(expense.amount || '') : ''}"></div>
                    <div><label>Tax category</label><select id="expCat">${opts}</select></div>
                    <div><label>Vendor (optional)</label><input id="expVendor" placeholder="Home Depot" value="${expense ? String(expense.vendor || '') : ''}"></div>
                    <div><label>Description</label><input id="expDesc" placeholder="Gas, detergent, etc." value="${expense ? String(expense.description || '') : ''}"></div>
                    <button class="btn-primary" type="button" onclick='saveExpense(${expense ? JSON.stringify(expense.id) : "null"})'>${isEdit ? 'Save changes' : 'Add expense'}</button>
                    ${isEdit ? `<button class="btn-danger" type="button" onclick='deleteExpense(${JSON.stringify(expense.id)})'><i class="fas fa-trash mr-1"></i>Delete</button>` : ''}
                </div>`;
            openModal('moneyModal');
        }

        function saveExpense(id) {
            const date = document.getElementById('expDate').value || ymdNow();
            const amount = parseAmt(document.getElementById('expAmount').value);
            const taxCategory = document.getElementById('expCat').value || 'other';
            const vendor = document.getElementById('expVendor').value || '';
            const description = document.getElementById('expDesc').value || '';
            if (!amount || amount <= 0) { showToast('Enter an amount', 'error'); return; }
            if (!date) { showToast('Pick a date', 'error'); return; }
            if (id) {
                CL_DATA.updateExpense(id, { date, amount, taxCategory, vendor, description });
                showToast('Expense saved', 'success');
            } else {
                const nowIso = new Date().toISOString();
                CL_DATA.addExpense({
                    id: 'exp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                    date, amount, taxCategory, vendor, description,
                    source: 'manual', createdAt: nowIso, lastUpdated: nowIso
                });
                showToast('Expense added', 'success');
            }
            closeModal('moneyModal');
            render();
        }

        function deleteExpense(id) {
            if (!confirm('Delete this expense?')) return;
            CL_DATA.deleteExpense(id);
            closeModal('moneyModal');
            showToast('Expense deleted', 'success');
            render();
        }

        // ---- CSV (automatic receipts) loading, shared with expenses.html ----
        const CSV_URL = (window.CL_CONFIG && CL_CONFIG.expenses && CL_CONFIG.expenses.csvUrl)
            || 'https://raw.githubusercontent.com/OneRedPanda99/Clearline/main/expenses/expenses.csv';
        const CSV_BASE = CSV_URL.replace(/\/expenses\/expenses\.csv$/, '');
        const PHOTO_BASE = CSV_BASE + '/expenses/';

        function parseCsv(text) {
            const rows = [];
            let i = 0, field = '', row = [], inQ = false;
            text = text.replace(/\r/g, '');
            while (i < text.length) {
                const c = text[i];
                if (inQ) {
                    if (c === '"') { if (text[i+1] === '"') { field += '"'; i += 2; continue; } inQ = false; i++; continue; }
                    field += c; i++; continue;
                }
                if (c === '"') { inQ = true; i++; continue; }
                if (c === ',') { row.push(field); field = ''; i++; continue; }
                if (c === '\n') { row.push(field); rows.push(row); field = ''; row = []; i++; continue; }
                field += c; i++;
            }
            if (field.length || row.length) { row.push(field); rows.push(row); }
            if (!rows.length) return [];
            const header = rows.shift().map(h => h.trim());
            return rows.filter(r => r.length > 1 && r.some(c => c.trim())).map(r => {
                const o = {};
                header.forEach((h, idx) => { o[h] = (r[idx] || '').trim(); });
                return o;
            });
        }

        async function loadAutoExpenses() {
            if (csvCache) return csvCache;
            if (csvError) return [];
            try {
                const res = await fetch(CSV_URL + '?t=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const text = await res.text();
                const recs = parseCsv(text).filter(r => r.id && r.id !== 'id');
                const ovMap = loadOverrides();
                csvCache = recs
                    .filter(r => !(ovMap[r.id] && ovMap[r.id]._hidden))
                    .map(r => {
                    const photoUrl = r.photo
                        ? (r.photo.startsWith('http') ? r.photo : PHOTO_BASE + r.photo.replace(/^expenses\//, ''))
                        : '';
                    const ov = ovMap[r.id] || {};
                    return {
                        id: r.id,
                        date: ov.date || (r.purchase_date || '').slice(0, 10),
                        vendor: ov.vendor || r.vendor || '',
                        amount: ov.amount || parseAmt(r.total),
                        subtotal: ov.amount ? 0 : parseAmt(r.subtotal),
                        tax: ov.amount ? 0 : parseAmt(r.tax),
                        category: ov.category || r.category || '',
                        note: ov.note || r.note || '',
                        status: r.status || 'ok',
                        source: 'auto',
                        photo: photoUrl
                    };
                });
                return csvCache;
            } catch (e) {
                csvError = true;
                console.warn('Could not load receipt expenses:', e);
                return [];
            }
        }

        // ---- Client-side overrides for receipt (auto) expenses ----
        // Receipt data lives in expenses.csv (repo file) which the browser can't
        // write. We keep editable overrides in localStorage, keyed by receipt id,
        // and merge them on top of the CSV values.
        const OV_KEY = 'cl-expense-overrides';
        function loadOverrides() {
            try { return JSON.parse(localStorage.getItem(OV_KEY) || '{}'); } catch (e) { return {}; }
        }
        function saveOverride(id, fields) {
            const o = loadOverrides();
            o[id] = Object.assign(o[id] || {}, fields);
            localStorage.setItem(OV_KEY, JSON.stringify(o));
        }
        function hideAutoExpense(id) {
            if (!confirm('Hide this receipt? (You can undo by clearing site data.)')) return;
            saveOverride(id, { _hidden: true });
            closeModal('moneyModal');
            showToast('Receipt hidden', 'success');
            render();
        }
        function editAutoExpense(id) {
            const x = (csvCache || []).find(r => r.id === id);
            if (!x) return;
            const o = loadOverrides()[id] || {};
            const cur = {
                date: o.date || x.date || '',
                vendor: o.vendor || x.vendor || '',
                amount: o.amount || x.amount || 0,
                category: o.category || x.category || '',
                note: o.note || x.note || ''
            };
            document.getElementById('moneyModalTitle').textContent = 'Edit receipt';
            const opts = TAX_CATS.map(c => `<option value="${c.id}" ${cur.category === c.id ? 'selected' : ''}>${c.label}</option>`).join('');
            document.getElementById('moneyModalBody').innerHTML = `
                <div class="form-grid">
                    <div><label>Date</label><input id="autoDate" type="date" value="${cur.date}"></div>
                    <div><label>Amount</label><input id="autoAmount" inputmode="decimal" placeholder="0.00" value="${cur.amount}"></div>
                    <div><label>Tax category</label><select id="autoCat">${opts}</select></div>
                    <div><label>Vendor</label><input id="autoVendor" value="${esc(cur.vendor)}"></div>
                    <div style="grid-column:1/-1;"><label>Note</label><input id="autoNote" value="${esc(cur.note)}"></div>
                </div>
                <div style="display:flex;gap:10px;margin-top:14px;">
                    <button type="button" class="sort-btn" style="flex:1;justify-content:center;" onclick="saveAutoExpense('${esc(id)}')"><i class="fas fa-save mr-1"></i> Save</button>
                    <button type="button" class="sort-btn" style="background:rgba(239,68,68,0.16);border-color:rgba(239,68,68,0.4);color:#fca5a5;justify-content:center;" onclick="hideAutoExpense('${esc(id)}')"><i class="fas fa-trash mr-1"></i> Delete</button>
                </div>`;
        }
        function saveAutoExpense(id) {
            const date = document.getElementById('autoDate').value || ymdNow();
            const amount = parseAmt(document.getElementById('autoAmount').value);
            const category = document.getElementById('autoCat').value || 'other';
            const vendor = document.getElementById('autoVendor').value || '';
            const note = document.getElementById('autoNote').value || '';
            if (!amount || amount <= 0) { showToast('Enter an amount', 'error'); return; }
            saveOverride(id, { date, amount, category, vendor, note, _edited: true });
            closeModal('moneyModal');
            showToast('Receipt updated', 'success');
            render();
        }

        function manualExpenses() {
            return CL_DATA.getExpenses().map(e => ({
                id: e.id,
                date: e.date || '',
                vendor: e.vendor || '',
                amount: parseAmt(e.amount),
                subtotal: 0,
                tax: 0,
                category: catLabel(e.taxCategory),
                note: e.description || '',
                status: 'ok',
                source: 'manual',
                raw: e,
                photo: ''
            }));
        }

        // A manual entry is a "dupe" of a receipt when they share the same
        // amount AND similar date (same calendar day) OR same vendor. This
        // catches the common case: a receipt was typ ed in before the
        // photo pipeline existed, then the pipeline added the same receipt.
        function isDupeOfReceipt(manual, auto) {
            if (Math.abs(manual.amount - auto.amount) > 0.01) return false;
            const sameDay = manual.date && manual.date.slice(0, 10) === (auto.date || '').slice(0, 10);
            const sameVendor = manual.vendor && auto.vendor &&
                manual.vendor.toLowerCase().replace(/[^a-z0-9]/g, '') ===
                auto.vendor.toLowerCase().replace(/[^a-z0-9]/g, '');
            return sameDay || sameVendor;
        }
        function markDupes(items) {
            const auto = items.filter(x => x.source === 'auto');
            items.forEach(x => {
                x.dupe = false;
                if (x.source === 'manual') {
                    x.dupe = auto.some(a => isDupeOfReceipt(x, a));
                }
            });
            return items;
        }

        async function renderExpenses() {
            const [auto] = await Promise.all([loadAutoExpenses()]);
            let items = [...manualExpenses(), ...auto];
            markDupes(items);

            // apply hide-dupes BEFORE filter so the counts reflect what's shown
            const dupeManual = items.filter(x => x.source === 'manual' && x.dupe);
            if (expHideDupes) items = items.filter(x => !(x.source === 'manual' && x.dupe));

            if (expFilter === 'manual') items = items.filter(x => x.source === 'manual');
            else if (expFilter === 'auto') items = items.filter(x => x.source === 'auto');

            // sort
            const dir = expSortDir === 'asc' ? 1 : -1;
            items.sort((a, b) => {
                let c = 0;
                if (expSortKey === 'amount') c = a.amount - b.amount;

                else if (expSortKey === 'source') c = a.source.localeCompare(b.source);

            const total = items.reduce((s, x) => s + x.amount, 0);

            const autoCount = items.filter(x => x.source === 'auto').length;

            const sortArrow = (key) => expSortKey === key ? `<span class="arrow">${expSortDir === 'asc' ? '▲' : '▼'}</span>` : '';

            let listHtml;
            if (!items.length) {
                listHtml = `<div class="glass-card rounded-xl p-4 text-center text-gray-400">
                    <i class="fas fa-receipt text-3xl mb-2"></i>

            } else {

                    const name = x.vendor || x.note || (x.source === 'auto' ? 'Receipt' : 'Expense');

        function removeDupes() {
            // permanently delete manual entries that duplicate a receipt
            const auto = [...manualExpenses().filter(()=>false), ...(csvCache||[])];
            const manual = CL_DATA.getExpenses();
            const keep = manual.filter(e => {
                const m = { amount: parseAmt(e.amount), vendor: e.vendor||'', date: (e.date||'').slice(0,10) };
                const isDupe = (csvCache||[]).some(a => {
                    if (Math.abs(m.amount - a.amount) > 0.01) return false;
                    const sameDay = m.date && m.date === (a.date||'').slice(0,10);
                    const sameVendor = m.vendor && a.vendor &&
                        m.vendor.toLowerCase().replace(/[^a-z0-9]/g,'') === a.vendor.toLowerCase().replace(/[^a-z0-9]/g,'');
                    return sameDay || sameVendor;
                });
                return !isDupe;
            });
            const removed = manual.length - keep.length;
            if (!removed) { showToast('No dupes to remove', 'success'); return; }
            if (!confirm(`Delete ${removed} manual dupe${removed===1?'':'s'}? The receipt-backed entries stay.`)) return;
            CL_DATA.saveExpenses(keep);
            showToast(`Removed ${removed} dupe${removed===1?'':'s'}`, 'success');
            render();
        }

                let snap;

        // ------------------------------------------------------------------
        //  REVENUE / TAXES (math fixed)
        // ------------------------------------------------------------------
        function parseYmd(ymd) {
            const s = String(ymd || '');
            const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (!m) return null;
            return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
        }
        function toYmd(d) {
            if (window.localYmd) return localYmd(d);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }
        function addDays(d, n) { const x = new Date(d.getFullYear(), d.getMonth(), d.getDate()); x.setDate(x.getDate() + n); return x; }
        function startOfWeek(d) {
            const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
            const day = (x.getDay() + 6) % 7;
            x.setDate(x.getDate() - day);
            return x;
        }
        function periodRange(period, today = new Date()) {
            const end = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            if (period === 'week') return { start: startOfWeek(end), end, label: 'This week' };
            if (period === 'month') return { start: new Date(end.getFullYear(), end.getMonth(), 1), end, label: 'This month' };
            return { start: new Date(end.getFullYear(), 0, 1), end, label: 'This year' };
        }
        function inRangeYmd(ymd, start, end) {
            const d = parseYmd(ymd);
            if (!d) return false;
            return d >= start && d <= end;
        }
        function jobRevenue(job) { return window.getJobDisplayTotal ? Number(getJobDisplayTotal(job) || 0) : 0; }
        function isCompletedJob(job) { return job && (job.status === 'completed' || job.status === 'paid'); }
        function isBookedPipeline(job) {
            if (!job) return false;
            const st = String(job.status || '');
            return st === 'scheduled' || st === 'in_progress' || st === 'booked';
        }
        async function periodPnl(start, end) {
            const jobs = CL_DATA.getJobs();
            const [auto] = await Promise.all([loadAutoExpenses()]);
            const manual = manualExpenses();
            const expenses = [...manual, ...auto];
            const payroll = CL_DATA.getPayroll();
            const rev = jobs.filter(j => isCompletedJob(j) && inRangeYmd(j.jobDate, start, end)).reduce((s, j) => s + jobRevenue(j), 0);
            const exp = expenses.filter(e => inRangeYmd(e.date, start, end)).reduce((s, e) => s + Number(e.amount || 0), 0);
            const pay = payroll.filter(p => inRangeYmd(p.date, start, end)).reduce((s, p) => s + Number(p.grossPay || (Number(p.hours||0)*Number(p.rate||0))), 0);
            return { rev, exp, pay, net: rev - exp - pay };
        }
        function calcForecasts(today = new Date()) {
            const jobs = CL_DATA.getJobs();
            const year = today.getFullYear();
            const yearStart = new Date(year, 0, 1);
            const priorYearStart = new Date(year - 1, 0, 1);
            const priorSameDay = new Date(year - 1, today.getMonth(), today.getDate());
            const weekRange = periodRange('week', today);
            const thisWeek = jobs.filter(j => isCompletedJob(j) && inRangeYmd(j.jobDate, weekRange.start, weekRange.end)).reduce((s, j) => s + jobRevenue(j), 0);
            const ytd = jobs.filter(j => isCompletedJob(j) && inRangeYmd(j.jobDate, yearStart, today)).reduce((s, j) => s + jobRevenue(j), 0);
            const priorYtd = jobs.filter(j => isCompletedJob(j) && inRangeYmd(j.jobDate, priorYearStart, priorSameDay)).reduce((s, j) => s + jobRevenue(j), 0);
            const dayOfYear = Math.max(1, Math.floor((today - yearStart) / 86400000) + 1);
            const weeksSoFar = Math.max(1, Math.ceil(dayOfYear / 7));
            const avgWeekly = ytd / weeksSoFar;
            const estThisYear = avgWeekly * 52;
            let growth = null;
            if (priorYtd > 0) growth = (ytd - priorYtd) / priorYtd;
            const estNextYear = avgWeekly * 52 * (1 + (growth === null ? 0 : growth));
            return { year, nextYear: year + 1, thisWeek, ytd, weeksSoFar, avgWeekly, estThisYear, priorYtd, growth, estNextYear };
        }
        function pieStyle(parts) {
            const total = parts.reduce((s, p) => s + Math.max(0, Number(p.value) || 0), 0);
            if (total <= 0) return 'conic-gradient(var(--md-sys-color-surface-container-highest) 0deg 360deg)';
            let acc = 0; const stops = [];
            parts.forEach(p => {
                const v = Math.max(0, Number(p.value) || 0);
                const start = (acc / total) * 360; acc += v;
                const end = (acc / total) * 360;
                stops.push(`${p.color} ${start.toFixed(2)}deg ${end.toFixed(2)}deg`);
            });
            return `conic-gradient(${stops.join(', ')})`;
        }
        function renderPieCard(title, parts) {
            const total = parts.reduce((s, p) => s + Math.max(0, Number(p.value) || 0), 0);
            const legend = parts.map(p => {
                const pct = total > 0 ? Math.round((Math.max(0, Number(p.value) || 0) / total) * 100) : 0;
                return `<div class="money-pie-legend-row">
                    <span class="money-pie-swatch" style="background:${p.color}"></span>
                    <span class="money-pie-legend-label">${esc(p.label)}</span>
                    <span class="money-pie-legend-val">${p.money ? fmtMoney(p.value) : String(p.value || 0)} · ${pct}%</span>
                </div>`;
            }).join('');
            return `<div class="glass-card rounded-xl p-4">
                <p class="section-title" style="margin-top:0;">${esc(title)}</p>
                <div class="money-pie" style="background:${pieStyle(parts)};" role="img" aria-label="${esc(title)}"></div>
                <div class="money-pie-legend">${legend || '<p class="money-sub">No data yet</p>'}</div>
            </div>`;
        }
        function allTimePipeline() {
            const jobs = CL_DATA.getJobs();
            const collected = jobs.filter(isCompletedJob).reduce((s, j) => s + jobRevenue(j), 0);
            const open = jobs.filter(isBookedPipeline).reduce((s, j) => s + jobRevenue(j), 0);
            return { jobs: jobs.length, collected, open, pipeline: collected + open };
        }
        async function expenseCategoryParts(limit = 6) {
            const [auto] = await Promise.all([loadAutoExpenses()]);
            const all = [...manualExpenses(), ...auto];
            const by = {};
            all.forEach(e => { by[e.category] = (by[e.category] || 0) + Number(e.amount || 0); });
            const colors = ['#34d399','#60a5fa','#fbbf24','#f87171','#8ab4ff','#a7f3d0','#94a3b8'];
            return Object.entries(by).map(([label, value]) => ({ label, value, money: true }))
                .sort((a, b) => b.value - a.value).slice(0, limit)
                .map((p, i) => ({ ...p, color: colors[i % colors.length] }));
        }
        function jobStatusParts() {
            const jobs = CL_DATA.getJobs();
            const counts = { completed: 0, scheduled: 0, lead: 0, other: 0 };
            jobs.forEach(j => {
                if (isCompletedJob(j)) counts.completed += 1;
                else if (isBookedPipeline(j)) counts.scheduled += 1;
                else if (j.status === 'new') counts.lead += 1;
                else counts.other += 1;
            });
            return [
                { label: 'Completed', value: counts.completed, color: '#34d399', money: false },
                { label: 'Booked', value: counts.scheduled, color: '#60a5fa', money: false },
                { label: 'Leads', value: counts.lead, color: '#fbbf24', money: false },
                { label: 'Other', value: counts.other, color: '#94a3b8', money: false }
            ].filter(p => p.value > 0);
        }
        function rollupByMonth(list, getDate, getAmt) {
            const m = new Map();
            for (const it of list) {
                const d = getDate(it); if (!d) continue;
                const k = monthKey(d);
                m.set(k, (m.get(k) || 0) + Number(getAmt(it) || 0));
            }
            return Array.from(m.entries()).sort((a,b) => b[0].localeCompare(a[0]));
        }
        async function renderRevenue() {
            const range = periodRange(moneyPeriod);
            const pnl = await periodPnl(range.start, range.end);
            const fc = calcForecasts();
            const all = allTimePipeline();
            const growthPct = fc.growth === null ? null : (fc.growth * 100);
            const growthLine = growthPct === null
                ? 'No last-year numbers yet. Assuming the same weekly pace.'
                : `Adjusted for ${growthPct >= 0 ? '+' : ''}${growthPct.toFixed(0)}% vs this time last year.`;

            const moneyPie = renderPieCard('Money in pipeline', [
                { label: 'Collected', value: all.collected, color: '#34d399', money: true },
                { label: 'Open', value: all.open, color: '#fbbf24', money: true }
            ]);
            const statusPie = renderPieCard('Jobs by status', jobStatusParts());
            const spendPie = renderPieCard('Spend by category', await expenseCategoryParts());

            const [auto] = await Promise.all([loadAutoExpenses()]);
            const jobs = CL_DATA.getJobs().filter(j => isCompletedJob(j) && j.jobDate);
            const expenses = [...manualExpenses(), ...auto].filter(e => e.date);
            const payroll = CL_DATA.getPayroll().filter(p => p.date);
            const revByMonth = rollupByMonth(jobs, j => j.jobDate, j => jobRevenue(j));
            const expByMonth = rollupByMonth(expenses, e => e.date, e => e.amount);
            const payByMonth = rollupByMonth(payroll, p => p.date, p => (p.grossPay || (Number(p.hours||0)*Number(p.rate||0))));
            const idx = (pairs) => new Map(pairs.map(([k,v]) => [k, v]));
            const iRev = idx(revByMonth), iExp = idx(expByMonth), iPay = idx(payByMonth);
            const months = Array.from(new Set([...iRev.keys(), ...iExp.keys(), ...iPay.keys()])).sort().reverse().slice(0, 6);

            return `
                <div class="page-tabs page-tabs--segmented" style="margin-bottom:12px;">
                    <button type="button" class="page-tab ${moneyPeriod==='week'?'active':''}" onclick="setMoneyPeriod('week')">Week</button>
                    <button type="button" class="page-tab ${moneyPeriod==='month'?'active':''}" onclick="setMoneyPeriod('month')">Month</button>
                    <button type="button" class="page-tab ${moneyPeriod==='year'?'active':''}" onclick="setMoneyPeriod('year')">Year</button>
                </div>
                <p class="section-title" style="margin-top:0;">${esc(range.label)}</p>
                <div class="stats-grid stats-grid--4 mb-3">
                    <div class="stat-card"><p class="value" style="color:#34d399;">${fmtMoney(pnl.rev)}</p><p class="label">Revenue</p></div>
                    <div class="stat-card"><p class="value" style="color:#fbbf24;">${fmtMoney(pnl.exp)}</p><p class="label">Expenses</p></div>
                    <div class="stat-card"><p class="value" style="color:var(--md-sys-color-secondary);">${fmtMoney(pnl.pay)}</p><p class="label">Payroll</p></div>
                    <div class="stat-card"><p class="value" style="color:${pnl.net>=0?'#60a5fa':'#f87171'};">${fmtMoney(pnl.net)}</p><p class="label">Net</p></div>
                </div>
                <p class="section-title">If this keeps up</p>
                <div class="glass-card rounded-xl p-4 mb-3" style="display:grid;gap:14px;">
                    <div>
                        <p class="money-sub" style="margin:0;">This week ${fmtMoney(fc.thisWeek)}</p>
                        <p style="font-size:22px;font-weight:800;margin:2px 0 4px;color:#e2e8f0;">${fmtMoney(fc.avgWeekly)}<span style="font-size:13px;font-weight:600;color:#94a3b8;"> / week avg</span></p>
                        <p class="money-sub" style="margin:0;">YTD ${fmtMoney(fc.ytd)} across ${fc.weeksSoFar} week${fc.weeksSoFar===1?'':'s'}</p>
                    </div>
                    <div style="border-top:1px solid var(--md-sys-color-outline-variant);padding-top:12px;">
                        <p class="money-sub" style="margin:0;">Est. ${fc.year}</p>
                        <p style="font-size:26px;font-weight:800;margin:2px 0 4px;color:#34d399;">${fmtMoney(fc.estThisYear)}</p>
                        <p class="money-sub" style="margin:0;">${fmtMoney(fc.avgWeekly)}/week × 52</p>
                    </div>
                    <div style="border-top:1px solid var(--md-sys-color-outline-variant);padding-top:12px;">
                        <p class="money-sub" style="margin:0;">Est. ${fc.nextYear}</p>
                        <p style="font-size:26px;font-weight:800;margin:2px 0 4px;color:var(--md-sys-color-primary);">${fmtMoney(fc.estNextYear)}</p>
                        <p class="money-sub" style="margin:0;">${esc(growthLine)}</p>
                    </div>
                </div>
                <p class="section-title">All-time</p>
                <div class="stats-grid stats-grid--4 mb-3">
                    <div class="stat-card"><p class="value" style="color:#60a5fa;">${fmtMoney(all.pipeline)}</p><p class="label">Pipeline</p></div>
                    <div class="stat-card"><p class="value" style="color:#34d399;">${fmtMoney(all.collected)}</p><p class="label">Collected</p></div>
                    <div class="stat-card"><p class="value" style="color:#fbbf24;">${fmtMoney(all.open)}</p><p class="label">Open</p></div>
                    <div class="stat-card"><p class="value" style="color:var(--md-sys-color-secondary);">${all.jobs}</p><p class="label">Jobs</p></div>
                </div>
                <div class="money-pie-grid mb-3">${moneyPie}${statusPie}${spendPie}</div>
                <p class="section-title">Recent months</p>
                ${months.length ? `<div class="glass-card" style="overflow:hidden;">
                    ${months.map(m => {
                        const rev = iRev.get(m) || 0, exp = iExp.get(m) || 0, pay = iPay.get(m) || 0;
                        const profit = rev - exp - pay;
                        return `<div class="money-row">
                            <span class="money-dot" style="background: rgba(96,165,250,0.55);"></span>
                            <div style="min-width:0;">
                                <p style="font-weight:900;margin:0;">${esc(m)}</p>
                                <p class="money-sub">Rev ${fmtMoney(rev)} · Exp ${fmtMoney(exp)} · Pay ${fmtMoney(pay)}</p>
                            </div>
                            <div class="money-amt" style="color:${profit>=0?'#34d399':'#f87171'};">${fmtMoney(profit)}</div>
                        </div>`;
                    }).join('')}
                </div>` : `<div class="glass-card rounded-xl p-4 text-center text-gray-400">
                    <p>No monthly history yet</p>
                    <p class="text-xs text-gray-500 mt-1">Finish jobs and log costs to build this chart.</p>
                </div>`}
            `;
        }
        async function renderTaxes() {
            const [auto] = await Promise.all([loadAutoExpenses()]);
            const manual = manualExpenses();
            const byCatMonth = {}, byCatQuarter = {};
            [...manual, ...auto].forEach(it => {
                const cat = it.category || 'Other';
                const mk = monthKey(it.date), qk = quarterKey(it.date);
                byCatMonth[cat] = byCatMonth[cat] || {}; byCatMonth[cat][mk] = (byCatMonth[cat][mk] || 0) + it.amount;
                byCatQuarter[cat] = byCatQuarter[cat] || {}; byCatQuarter[cat][qk] = (byCatQuarter[cat][qk] || 0) + it.amount;
            });
            const cats = Object.keys(byCatMonth).sort();
            const months = Array.from(new Set([...manual, ...auto].map(it => monthKey(it.date)))).sort().reverse().slice(0, 6);
            const quarters = Array.from(new Set([...manual, ...auto].map(it => quarterKey(it.date)))).sort().reverse().slice(0, 6);
            const rowsFor = (bucket, keys) => cats.map(cat => ({
                cat, total: keys.reduce((s,k) => s + Number((bucket[cat] && bucket[cat][k]) || 0), 0)
            })).sort((a,b) => b.total - a.total);
            const table = (title, keys, rows) => `
                <p class="section-title" style="margin-top: 14px;">${title}</p>
                <div class="glass-card" style="overflow:hidden;">
                    ${rows.filter(r => r.total > 0).map(r => `<div class="money-row">
                        <span class="money-dot" style="background: rgba(251,191,36,0.55);"></span>
                        <div style="min-width:0;"><p style="font-weight:800;margin:0;">${esc(r.cat)}</p><p class="money-sub">${keys.join(' · ')}</p></div>
                        <div class="money-amt">${fmtMoney(r.total)}</div>
                    </div>`).join('')}
                </div>`;
            if (!cats.length) return '';
            return table('Monthly totals (latest)', months, rowsFor(byCatMonth, months))
                 + table('Quarterly totals (latest)', quarters, rowsFor(byCatQuarter, quarters));
        }
        function quarterKey(ymd) {
            const m = parseInt(String(ymd||'').slice(5,7), 10) || 0;
            const q = m <= 3 ? 1 : m <= 6 ? 2 : m <= 9 ? 3 : 4;
            return String(ymd||'').slice(0,4) + '-Q' + q;
        }

        // ------------------------------------------------------------------
        async function render() {
            showOwnerOnlyUI();
            renderStats();
            const body = document.getElementById('moneyBody');
            if (!ensureOwner()) {
                body.innerHTML = `<div class="glass-card rounded-xl p-4 text-center text-gray-400">
                    <i class="fas fa-lock text-3xl mb-2"></i><p>Owner only</p>
                    <p class="text-xs text-gray-500 mt-1">Ask your owner for access to Money.</p></div>`;
                return;
            }
            if (currentTab === 'expenses') body.innerHTML = await renderExpenses();
            else if (currentTab === 'payroll') body.innerHTML = await renderPayroll();
            else body.innerHTML = await renderRevenue();
        }
        function renderStats() { document.getElementById('statsRow').innerHTML = ''; }

        // ------------------------------------------------------------------
        function start(profile) {
            if (profile && typeof profile.then === 'function') { profile.then(start); return; }
            myProfile = profile; render();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setActiveNav();
            document.getElementById('addBtn').addEventListener('click', openAdd);
            const p = (window.CL_FIREBASE && CL_FIREBASE.getProfile) ? CL_FIREBASE.getProfile() : null;
            Promise.resolve(p).then(profile => { if (profile) start(profile); });
        });
        window.addEventListener('cl-profile-updated', (e) => start(e.detail && e.detail.profile));
        window.addEventListener('cl-sync-updated', () => render());
        // re-render when a new receipt CSV is published
        window.addEventListener('cl-expenses-updated', () => { csvCache = null; csvError = false; render(); });
    </script>
</body>
</html>
